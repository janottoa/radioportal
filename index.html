    <script>
        // Funksjon for å sende logger til server
        function sendToLogServer(message) {
            fetch('https://anthonsen.net:3301/log', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ message: message })
            }).catch(() => {});
        }
    
        // Lagre originale console-metoder
        const originalLog = console.log;
        const originalError = console.error;
    
        // Overstyrer console.log
        console.log = function() {
            // Kall original først
            originalLog.apply(console, arguments);
            
            // Send til server
            const message = Array.from(arguments).map(arg => 
                typeof arg === 'object' ? JSON.stringify(arg) : String(arg)
            ).join(' ');
            
            sendToLogServer(message);
        };
    
        // Overstyrer console.error
        console.error = function() {
            // Kall original først
            originalError.apply(console, arguments);
            
            // Send til server
            const message = Array.from(arguments).map(arg => 
                typeof arg === 'object' ? JSON.stringify(arg) : String(arg)
            ).join(' ');
            
            sendToLogServer("ERROR: " + message);
        };
    </script>

        if (!url || !station || !stationDiv) {
            console.error("Manglende data: ", { url, station, stationDiv });
            console.log(`[ERROR] Mangler nødvendige data i initializeAudio: URL=${url}, stasjon=${station ? station.name : "ukjent"}`);
            return;
        }

        // Fjern markeringer fra tidligere spillende stasjoner og tilbakestill UI
        document.querySelectorAll('.station').forEach(div => {
            div.classList.remove('playing', 'logo-playing');
            div.style.backgroundImage = ''; // Fjern tidligere bakgrunnsbilde
            const favoriteButton = div.querySelector('.favorite-button');
            if (favoriteButton) {
                favoriteButton.style.display = 'block'; // Vis favorittknappen
            }
        });

        // Marker den aktuelle stasjonen som spillende
        stationDiv.classList.add('playing');

            stationDiv.classList.add('logo-playing');
            stationDiv.style.backgroundImage = `url('${station.logo}')`;
        }

        // Skjul favorittknappen for spillende stasjon
        const playingFavoriteButton = stationDiv.querySelector('.favorite-button');
        if (playingFavoriteButton) {
            playingFavoriteButton.style.display = 'none';
        }

        // Stopp tidligere lydstrøm hvis aktiv
        if (currentAudio) {
            console.log("[INFO] Stopper tidligere lydstrøm.");
            currentAudio.pause();
            currentAudio = null;
        }

        // Opprett ny lydstrøm basert på URL-type
        if (url.endsWith('.m3u8') && Hls.isSupported()) {
            const videoElement = document.createElement('video');
            videoElement.style.display = 'none'; // Skjul videoelementet
            document.body.appendChild(videoElement);

            const hls = new Hls();
            hls.loadSource(url);
            hls.attachMedia(videoElement);
            hls.on(Hls.Events.MANIFEST_PARSED, () => {
                videoElement.play().then(() => {
                    console.log("HLS-avspilling startet:", url);
                }).catch(error => {
                    console.error("HLS-avspilling feilet:", error);
                });
            });

            currentAudio = videoElement;
            updateFooter(station); // Oppdater footer med metadata
        } else {
            // For vanlige strømminger
            currentAudio = new Audio(url);
            currentAudio.muted = true; // Start mutet for å unngå autoplay blokkering

            currentAudio.addEventListener('canplay', () => {
                currentAudio.muted = false;
                currentAudio.play().then(() => {
                    console.log("Avspilling startet for:", station.name);
                    updateFooter(station); // Oppdater footer med metadata
                }).catch(err => {
                    console.error("Feil under avspilling:", err);
                    console.log(`[ERROR] Feil oppstod under avspilling: ${err.message}`);
                });
            });
        }

        // Når lydstrømmen er ferdigspilt
        currentAudio.addEventListener('ended', () => {
            handleSongEnd(station, stationDiv);
            console.log("Stream ended for:", url);
        });

        // Håndter feil ved lasting av lydstrøm
        currentAudio.addEventListener('error', (error) => {
            console.error("Feil ved lasting av lydstrøm:", error);
            alert("Kunne ikke spille av stasjonen. Sjekk nettverk og URL.");
        });

        // Sett opp WebSocket for å hente metadata
        setupWebSocket(url, stationDiv, station,app);

    } catch (error) {
        console.error("Feil i initializeAudio:", error);
        console.log(`[ERROR] Unntak oppstod i initializeAudio: ${error.message}`);
    }
}

    function showStations(category) {
        const stationsGrid = document.getElementById("stations-grid");
        stationsGrid.innerHTML = ""; // Tøm grid

        const stations = category === "Favoritter"
            ? (JSON.parse(localStorage.getItem("favorites")) || []).map(fav => {
                return stationsData[fav.category]?.find(station => station.url === fav.url);
            }).filter(station => station) // Filtrer ut ugyldige stasjoner
            : stationsData[category];

        if (stations && stations.length > 0) {
            stations.forEach(station => {
                const stationDiv = document.createElement("div");
                
                stationDiv.classList.add("station");
                stationDiv.setAttribute("data-category", category);
                stationDiv.setAttribute("data-url", station.url);
                stationDiv.setAttribute("data-app", station.app); 
                const app = station.app;
                // Legg til logo
                if (station.logo) {
                    const logo = document.createElement("img");
                    logo.src = station.logo;
                    logo.alt = `${station.name} logo`;
                    logo.className = "station-logo";
                    stationDiv.appendChild(logo);
                }

                // Legg til stasjonsnavn
                const name = document.createElement("div");
                name.classList.add("station-name");
                name.textContent = station.name;
                stationDiv.appendChild(name);

                // Legg til favorittknapp
                const favoriteButton = document.createElement("button");
                favoriteButton.classList.add("favorite-button");
                favoriteButton.textContent = isFavorite(station.url) ? "★" : "☆";
                favoriteButton.onclick = (e) => {
                    e.stopPropagation(); // Forhindrer klikk på stasjonen
                    toggleFavorite(station.url, category);
                    favoriteButton.textContent = isFavorite(station.url) ? "★" : "☆";
                };
                stationDiv.appendChild(favoriteButton);

                // Legg til klikkhåndtering for stasjonen

                stationsGrid.appendChild(stationDiv);
            });

            stationsGrid.innerHTML = `<p style="color:white;">Ingen stasjoner funnet.</p>`;
        }
    }


    // Favoritt-funksjon
    function toggleFavorite(url, category) {
        const favorites = JSON.parse(localStorage.getItem("favorites")) || [];
        const index = favorites.findIndex(fav => fav.url === url);

        if (index !== -1) {
            favorites.splice(index, 1); // Fjern fra favoritter
        } else {
            favorites.push({ url, category }); // Legg til favoritter
        }

        localStorage.setItem("favorites", JSON.stringify(favorites));
        updateFavoritesSidebar(); // Oppdater sidebar
    }

    }

    function updateFooter(station, metadata = null) {
        const logoElement = document.getElementById("station-logo");
        const songInfoElement = document.getElementById("song-info");
        const channelNameElement = document.getElementById("channel-name");

        if (station) {
            console.log("Oppdaterer footer for stasjon:", station);

            // Oppdater logo
            if (station.logo) {
                logoElement.src = station.logo;
                document.logo = station.logo;
                logoElement.style.display = "inline";
                console.log("Oppdaterte logo til footer:", station.logo);
            } else {
                logoElement.style.display = "none";
                console.warn("Ingen logo funnet for stasjonen.");
            }

            // Oppdater songInfo
            if (metadata && metadata.songInfo) {
                // Bruk metadata hvis tilgjengelig
                songInfoElement.textContent = metadata.songInfo;
                console.log("Bruker metadata for songInfo:", metadata.songInfo);
            } else if (station.songInfo) {
                // Bruk songInfo fra stations.json som fallback
                songInfoElement.textContent = station.songInfo;
                console.log("Bruker songInfo fra stations.json:", station.songInfo);
            } else {
                // Ingen informasjon tilgjengelig
                songInfoElement.textContent = "";
                console.warn("Ingen informasjon tilgjengelig");
                channelNameElement.textContent = "";
                data.StreamTitle = "";
                 
            }
        } else {
            // Tilbakestill footer når ingen stasjon er valgt
            console.warn("Ingen stasjon valgt. Tilbakestiller footer.");
            logoElement.style.display = "none";
            if (channelNameElement) channelNameElement.textContent = "";
            songInfoElement.textContent = "";
             
     // Tilbakestill document.title til standardverdi
     document.title = "RADIOPORTAL";

// Tilbakestill header-tittel
const headerTitle = document.querySelector('.header-title');
if (headerTitle) {
