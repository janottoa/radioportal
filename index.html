<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Radioportal 🚗</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <h1>🚗 Radioportal</h1>
    <p class="subtitle">Min private strømmeradio</p>
  </header>

  <main>
    <section class="now-playing" id="now-playing" aria-live="polite">
      <div class="station-logo" id="station-logo" aria-hidden="true">📻</div>
      <div class="station-info">
        <span class="station-name" id="station-name">Velg en stasjon</span>
        <span class="station-genre" id="station-genre"></span>
        <span class="status" id="status">Stoppet</span>
      </div>
    </section>

    <section class="player-controls" aria-label="Spillerkontroller">
      <button class="btn-control btn-prev" id="btn-prev" aria-label="Forrige stasjon" title="Forrige stasjon">⏮</button>
      <button class="btn-control btn-play" id="btn-play" aria-label="Spill / Pause" title="Spill / Pause">▶</button>
      <button class="btn-control btn-next" id="btn-next" aria-label="Neste stasjon" title="Neste stasjon">⏭</button>
    </section>

    <section class="volume-section" aria-label="Volumkontroll">
      <label for="volume-slider" class="volume-label">🔊 Volum</label>
      <input
        type="range"
        id="volume-slider"
        min="0"
        max="1"
        step="0.05"
        value="0.8"
        aria-label="Volum"
      />
      <span id="volume-display">80%</span>
    </section>

    <section class="stations" aria-label="Stasjoner">
      <h2>Stasjoner</h2>
      <ul class="station-list" id="station-list" role="list"></ul>
    </section>
  </main>

  <audio id="audio-player" preload="none"></audio>

  <script src="app.js"></script>
</body>
</html>
