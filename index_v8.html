<!DOCTYPE html>
<html lang="no">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Radioportal">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#000000">
    <meta name="msapplication-TileColor" content="#000000">
    <link rel="apple-touch-icon" href="https://anthonsen.net/logo/moffaradio.png">
    <link rel="manifest" href="manifest.json">
    <title>Radioportal</title>
    <link rel="icon" href="https://anthonsen.net/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="radio-styles.css">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.18"></script>
</head>

<body>

    <!-- Full Lyrics Modal -->
    <div class="lyrics-modal" id="full-lyrics-modal">
        <div class="lyrics-modal-header">
            <span class="lyrics-modal-title" id="full-lyrics-title">📝 Sangtekst</span>
            <button class="lyrics-modal-close" onclick="closeFullLyricsModal()" title="Lukk">✕</button>
        </div>
        <div class="lyrics-modal-body" id="full-lyrics-body"></div>
    </div>

    <div class="header">
        <div class="header-logo">
            <img src="https://anthonsen.net/logo/moffaradio.png" alt="Moffa Logo">
        </div>
        <div class="header-title"></div>
        <div class="header-buttons">
            <button id="spillelisteAddButton" class="switch-button" style="display: none;">Legg til i Spilleliste</button>
            <select id="theme-selector" class="switch-button" onchange="changeTheme(this.value)" style="cursor: pointer;">
                <option value="lys-modern">☀️ Lys Modern</option>
                <option value="mork-modern">🌙 Mørk Modern</option>
                <option value="klassisk-gra">⚫ Klassisk Grå</option>
                <option value="gammel-klassisk">🔲 Gammel Klassisk</option>
                <option value="solnedgang">🌅 Solnedgang</option>
                <option value="hav">🌊 Hav</option>
            </select>
            <button class="switch-button" onclick="refreshMetadata()" title="Hent metadata på nytt uten å stoppe musikken">🔄 Metadata</button>
            <button class="switch-button" onclick="openFullLyricsModal()" title="Vis hele sangteksten">📝 Tekst</button>
            <!-- SONOS BTN --><button class="switch-button sonos-control-btn" id="sonos-control-btn" onclick="openSonosModal()" title="Send til Sonos-høyttalere">🔊 Sonos</button><span class="sonos-output-indicator" id="sonos-output-indicator">🔊 Sonos</span><!-- /SONOS BTN -->
            <button class="switch-button" onclick="toggleFullscreen()" title="Fullskjerm (skjuler adresselinje)">⛶</button>
        </div>
    </div>

    <div class="container">
        <div class="sidebar" id="sidebar"></div>
        <div class="content">
            <div class="stations-grid" id="stations-grid"></div>
        </div>
    </div>

    <div class="footer">
        <div class="info">
            <img id="station-logo" src="" alt="Stasjonslogo" style="display: none;">
            <div id="lyrics-container" class="lyrics-display">
                <p>Velg en stasjon...</p>
            </div>
            <div class="lyrics-controls">
                <button onclick="adjustLyricsOffset(-0.5)" title="0.5s tidligere">◀◀</button>
                <button onclick="adjustLyricsOffset(0.5)" title="0.5s senere">▶▶</button>
                <span class="offset-display" id="offset-display">0.0s</span>
                <button id="holdback-toggle" onclick="toggleHoldBack()" title="Hold tilbake lyrics">⏸</button>
            </div>
        </div>
    </div>

    <script>
        // ===== LOGSERVER =====
    let logServerEnabled = true;
    let lastFail = 0;

    function sendToLogServer(message) {
        const now = Date.now();
        if (!logServerEnabled && now - lastFail < 60000) return;
        fetch('https://anthonsen.net:3301/log', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message })
        }).then(() => {
            logServerEnabled = true;
        }).catch(() => {
            logServerEnabled = false;
            lastFail = Date.now();
        });
    }

    // ===== LYRICS SYSTEM =====
    let lyricsIndex = 0;
    let lyricsInterval;
    let syncedLyricsData = [];
    let songStartTime = 0;
    let lyricsSyncBaseTime = 0;
    let missedTime = 0;
    let dynamicOffset = -1.5;
    let holdBackActive = false;
    const HOLD_BACK_AMOUNT = -1.5;
    const FALSE_START_THRESHOLD = 2;
    let currentLyricsLines = [];          // hele tekst-array for full-lyrics-modal
    let currentLyricsTitle = '';          // "Artist - Tittel" for modal-header
    let lastTrackKey = '';                // cache-nøkkel for å unngå re-render ved samme sang

    holdBackActive = false;
    localStorage.setItem('holdBackActive', 'false');

    const savedOffset = parseFloat(localStorage.getItem('lyricsOffset') || '-1.5');
    if (savedOffset >= -5 && savedOffset <= 5) {
        dynamicOffset = savedOffset;
    } else {
        dynamicOffset = -1.5;
        localStorage.setItem('lyricsOffset', '-1.5');
    }

    function updateOffsetDisplay() {
        const display = document.getElementById('offset-display');
        if (display) {
            const totalOffset = dynamicOffset + (holdBackActive ? HOLD_BACK_AMOUNT : 0);
            display.textContent = (totalOffset >= 0 ? '+' : '') + totalOffset.toFixed(1) + 's';
        }
        const toggleBtn = document.getElementById('holdback-toggle');
        if (toggleBtn) {
            toggleBtn.classList.toggle('active', holdBackActive);
            toggleBtn.textContent = holdBackActive ? '▶' : '⏸';
        }
    }

    function adjustLyricsOffset(deltaSeconds) {
        dynamicOffset += deltaSeconds;
        localStorage.setItem('lyricsOffset', dynamicOffset.toFixed(1));
        updateOffsetDisplay();
        if (syncedLyricsData.length > 0) updateSyncedLyrics();
    }

    function toggleHoldBack() {
        holdBackActive = !holdBackActive;
        localStorage.setItem('holdBackActive', holdBackActive);
        updateOffsetDisplay();
        if (syncedLyricsData.length > 0) updateSyncedLyrics();
    }

    function parseLRC(lrcString) {
        if (!lrcString) return [];
        return lrcString.split(/\r?\n/).reduce((parsed, line) => {
            const match = line.match(/\[(\d+):(\d+\.\d+)\](.*)/);
            if (match) {
                const seconds = parseInt(match[1]) * 60 + parseFloat(match[2]);
                const text = match[3].trim();
                if (text) parsed.push({ time: seconds, text });
            }
            return parsed;
        }, []);
    }

    function getSongElapsedSeconds() {
        if (!syncedLyricsData.length) return 0;
        if (lyricsSyncBaseTime === 0) return missedTime;
        return missedTime + (Date.now() - lyricsSyncBaseTime) / 1000;
    }

    function getTotalOffset() {
        return dynamicOffset + (holdBackActive ? HOLD_BACK_AMOUNT : 0);
    }

    function updateSyncedLyrics() {
        const container = document.getElementById('lyrics-container');
        if (!container || syncedLyricsData.length === 0) return;

        const totalOffset = getTotalOffset();
        const adjustedTime = Math.max(0, getSongElapsedSeconds() + totalOffset);

        let activeIndex = 0;
        for (let i = 0; i < syncedLyricsData.length; i++) {
            if (syncedLyricsData[i].time <= adjustedTime) {
                activeIndex = i;
            } else break;
        }

        const firstLine = syncedLyricsData[activeIndex]?.text || "";
        const secondLine = syncedLyricsData[activeIndex + 1]?.text || "";
        container.innerHTML = `<p>${firstLine}</p><p>${secondLine}</p>`;
    }

    function updateRollingLyrics(lyricsLines) {
        const container = document.getElementById('lyrics-container');
        if (!container || !lyricsLines || lyricsLines.length === 0) return;

        const firstLine = lyricsLines[lyricsIndex];
        const secondLine = lyricsLines[(lyricsIndex + 1) % lyricsLines.length];
        container.innerHTML = `<p>${firstLine}</p><p>${secondLine}</p>`;
        lyricsIndex = (lyricsIndex + 1) % lyricsLines.length;
    }

    function startLyricsRotation(lyrics) {
        const container = document.getElementById("lyrics-container");
        if (!container) return;

        if (lyricsInterval) {
            clearInterval(lyricsInterval);
            lyricsInterval = null;
        }

        // Lagre hele lyrics for full-modal-visning
        currentLyricsLines = [];
        if (lyrics.lyricsLines && lyrics.lyricsLines.length > 0) {
            currentLyricsLines = lyrics.lyricsLines.slice();
        }

        if (lyrics.syncedLyrics && lyrics.syncedLyrics.length > 0) {
            const synced = parseLRC(lyrics.syncedLyrics);
            if (synced.length > 0) {
                syncedLyricsData = synced;
                // Hvis vi ikke har plain lines, bygg fra synced for modal
                if (currentLyricsLines.length === 0) {
                    currentLyricsLines = synced.map(s => s.text);
                }
                if (songStartTime > 0) {
                    missedTime = (Date.now() - songStartTime) / 1000;
                    if (missedTime < FALSE_START_THRESHOLD) missedTime = 0;
                }
                lyricsSyncBaseTime = Date.now();
                updateSyncedLyrics();
                lyricsInterval = setInterval(updateSyncedLyrics, 250);
                updateOffsetDisplay();
                refreshFullLyricsModalIfOpen();
                return;
            }
        }

        if (lyrics.lyricsLines && lyrics.lyricsLines.length > 0) {
            lyricsIndex = 0;
            updateRollingLyrics(lyrics.lyricsLines);
            lyricsInterval = setInterval(() => updateRollingLyrics(lyrics.lyricsLines), 5000);
            refreshFullLyricsModalIfOpen();
            return;
        }

        container.innerHTML = `<p>Ingen tekst tilgjengelig</p><p></p>`;
        refreshFullLyricsModalIfOpen();
    }

    function stopLyricsRotation() {
        if (lyricsInterval) {
            clearInterval(lyricsInterval);
            lyricsInterval = null;
        }
        syncedLyricsData = [];
        lyricsSyncBaseTime = 0;
        currentLyricsLines = [];
        refreshFullLyricsModalIfOpen();
    }

    // ===== FULL LYRICS MODAL =====
    function openFullLyricsModal() {
        const modal = document.getElementById('full-lyrics-modal');
        if (!modal) return;
        renderFullLyricsModal();
        modal.classList.add('active');
    }

    function closeFullLyricsModal() {
        const modal = document.getElementById('full-lyrics-modal');
        if (modal) modal.classList.remove('active');
    }

    function refreshFullLyricsModalIfOpen() {
        const modal = document.getElementById('full-lyrics-modal');
        if (modal && modal.classList.contains('active')) {
            renderFullLyricsModal();
        }
    }

    function renderFullLyricsModal() {
        const body = document.getElementById('full-lyrics-body');
        const titleEl = document.getElementById('full-lyrics-title');
        if (!body) return;

        // Bygg tittel fra currentMetadata hvis tilgjengelig
        let titleText = '📝 Sangtekst';
        try {
            if (typeof currentMetadata === 'object' && currentMetadata) {
                const a = currentMetadata.artist || '';
                const t = currentMetadata.title || '';
                if (a || t) titleText = `📝 ${[a, t].filter(Boolean).join(' – ')}`;
            }
        } catch(_) {}
        if (titleEl) titleEl.textContent = titleText;

        if (syncedLyricsData && syncedLyricsData.length > 0) {
            const totalOffset = dynamicOffset + (holdBackActive ? HOLD_BACK_AMOUNT : 0);
            const adjustedTime = Math.max(0, getSongElapsedSeconds() + totalOffset);
            let activeIndex = 0;
            for (let i = 0; i < syncedLyricsData.length; i++) {
                if (syncedLyricsData[i].time <= adjustedTime) activeIndex = i;
                else break;
            }
            body.innerHTML = syncedLyricsData.map((item, i) =>
                `<div class="lyric-line ${i === activeIndex ? 'current' : ''}">${escapeHtmlSafe(item.text)}</div>`
            ).join('');
            // Scroll til aktiv linje
            setTimeout(() => {
                const cur = body.querySelector('.lyric-line.current');
                if (cur) cur.scrollIntoView({ block: 'center', behavior: 'smooth' });
            }, 50);
        } else if (currentLyricsLines && currentLyricsLines.length > 0) {
            body.innerHTML = currentLyricsLines.map((line, i) =>
                `<div class="lyric-line ${i === lyricsIndex ? 'current' : ''}">${escapeHtmlSafe(line)}</div>`
            ).join('');
        } else {
            body.innerHTML = '<div style="text-align:center;padding:40px;opacity:0.7">Ingen sangtekst tilgjengelig for denne sangen.</div>';
        }
    }

    function escapeHtmlSafe(s) {
        return String(s == null ? '' : s)
            .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    // ESC lukker modalen
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
            const modal = document.getElementById('full-lyrics-modal');
            if (modal && modal.classList.contains('active')) closeFullLyricsModal();
        }
    });
    // ===== UI FUNKSJONER =====
    function refreshPage() {
        window.location.reload();
    }

    // ===== REFRESH METADATA (uten reload) =====
    function toggleFullscreen() {
        if (!document.fullscreenElement) {
            document.documentElement.requestFullscreen().catch(err => {
                console.log("Fullskjerm ikke tilgjengelig:", err);
            });
        } else {
            document.exitFullscreen();
        }
    }

    function refreshMetadata() {
        const expandedDiv = document.querySelector('.station.expanded');
        if (!expandedDiv) {
            console.log("Ingen stasjon spiller");
            return;
        }

        const url = expandedDiv.getAttribute("data-url");
        const category = expandedDiv.getAttribute("data-category");
        const station = stationsData[category]?.find(s => s.url === url);
        
        if (!url || !station) {
            console.log("Kunne ikke finne stasjon-info");
            return;
        }

        // Tving full re-render selv om sangen er den samme
        lastTrackKey = '';

        // Vis loading-status
        let metadataDiv = expandedDiv.querySelector('.metadata');
        if (!metadataDiv) {
            metadataDiv = document.createElement('div');
            metadataDiv.className = 'metadata';
            metadataDiv.style.display = 'block';
            metadataDiv.style.padding = '10px';
            expandedDiv.appendChild(metadataDiv);
        }
        metadataDiv.innerHTML = '<p style="color: var(--text-secondary); font-style: italic;">🔄 Henter metadata...</p>';

        // Lukk eksisterende WebSocket og opprett ny
        if (ws) {
            ws.close();
            ws = null;
        }
        
        // Nullstill retry-teller
        wsRetryCount = 0;
        
        // Opprett ny WebSocket-tilkobling
        setupWebSocket(url, expandedDiv, station, station.app);
        
        console.log("🔄 Metadata refresh initiert for:", station.name);
    }

    function changeTheme(themeName) {
        document.documentElement.setAttribute('data-theme', themeName);
        localStorage.setItem('selectedTheme', themeName);
        console.log(`Tema endret til: ${themeName}`);
    }

    // Last lagret tema
    const savedTheme = localStorage.getItem('selectedTheme') || 'lys-modern';
    document.documentElement.setAttribute('data-theme', savedTheme);
    
    // Oppdater temavelgeren
    const themeSelector = document.getElementById('theme-selector');
    if (themeSelector) {
        themeSelector.value = savedTheme;
    }

    updateOffsetDisplay();

    // ===== MENYER =====
    const sidebar = document.getElementById("sidebar");
    const stationsGrid = document.getElementById("stations-grid");

    const menus = {
        main: [
            { label: "NRK", action: () => showStations("NRK") },
            { label: "P4", action: () => showStations("P4") },
            { label: "Radio Norge", action: () => showStations("Radio Norge") },
            { label: "Metro", action: () => showStations("Metro") },
            { label: "Norske", action: () => showStations("Lokale") },
            { label: "Mix", action: () => showStations("Internet") },
            { label: "Colombia", action: () => showStations("Colombia") },
            { label: "Mer...", action: () => loadMenu("extra") },
        ],
        extra: [
            { label: "1fm", action: () => showStations("1fm") },
            { label: "181fm", action: () => showStations("181fm") },
            { label: "HotMix", action: () => showStations("hotmix") },
            { label: "RadioTunes", action: () => showStations("radiotunes") },
            { label: "100fm", action: () => showStations("100fm") },
            { label: "Latinsk", action: () => showStations("Latinske") },
            { label: "Tilbake", action: () => loadMenu("main") },
            { label: "Mer...", action: () => loadMenu("extra2") },
        ],
        extra2: [
            { label: "UK/Irland", action: () => showStations("utland") },
            { label: "Tyskland", action: () => showStations("de") },
            { label: "Sverige", action: () => showStations("se") },
            { label: "Danmark", action: () => showStations("dk") },
            { label: "USA", action: () => showStations("us") },
            { label: "Startside", action: () => loadMenu("main") },
            { label: "Tilbake", action: () => loadMenu("extra") },
            { label: "Mer...", action: () => loadMenu("extra3") },
        ],
        extra3: [
            { label: "Spania", action: () => showStations("es") },
            { label: "Frankrike", action: () => showStations("fr") },
            { label: "Italia", action: () => showStations("it") },
            { label: "Hellas", action: () => showStations("gr") },
            { label: "Balkan", action: () => showStations("yo") },
            { label: "Startside", action: () => loadMenu("main") },
            { label: "Tilbake", action: () => loadMenu("extra2") },
            { label: "Mer...", action: () => loadMenu("extra4") },
        ],
        extra4: [
            { label: "Polen", action: () => showStations("pl") },
            { label: "Hvite og Russland", action: () => showStations("by") },
            { label: "Baltic", action: () => showStations("baltic") },
            { label: "Tjekkoslovakia", action: () => showStations("tjekkia") },
            { label: "Ugarn", action: () => showStations("hu") },
            { label: "Romania/Bulgaria", action: () => showStations("Ledig10") },
            { label: "Startside", action: () => loadMenu("main") },
            { label: "Tilbake", action: () => loadMenu("extra3") },
        ],
    };

    function loadMenu(menuName) {
        const buttons = Array.from(sidebar.querySelectorAll("button")).filter(
            (button) => button.getAttribute("data-category") !== "Favoritter"
        );
        buttons.forEach((button) => button.remove());

        menus[menuName].forEach((item) => {
            const button = document.createElement("button");
            button.textContent = item.label;
            button.onclick = item.action;
            sidebar.appendChild(button);
        });
    }

    // ===== GLOBAL STATE =====
    let stationsData = {};
    let currentlyPlayingUrl = null;
    let currentAudio = null;
    let ws = null;
    let currentlyPlayingStation = null;
    let currentMetadata = {};
    let wsConnectionState = 'disconnected'; // 'disconnected', 'connecting', 'connected'
    // FIX: session-token. Hver gang vi bytter stasjon (eller stopper) bumpes denne.
    // Sene WS-meldinger, retries og timeouts som tilhører en gammel session
    // skal ignoreres, slik at metadata aldri "lekker" til feil stasjon.
    let wsSession = 0;

    // ===== SONOS BRIDGE (expose state to Sonos module) =====
    Object.defineProperty(window, 'currentAudio', {
        get(){ return currentAudio; },
        set(v){ currentAudio = v; },
        configurable: true
    });
    Object.defineProperty(window, 'currentlyPlayingUrl', {
        get(){ return currentlyPlayingUrl; },
        set(v){ currentlyPlayingUrl = v; },
        configurable: true
    });

    // ===== LAST STASJONS-DATA =====
    fetch('stations.json')
        .then(response => {
            if (!response.ok) throw new Error(`HTTP ${response.statusText}`);
            return response.json();
        })
        .then(data => {
            stationsData = data;

            Object.keys(stationsData).forEach(currentCategory => {
                stationsData[currentCategory].forEach(station => {
                    const stationDiv = document.createElement("div");
                    stationDiv.className = "station";
                    stationDiv.setAttribute("data-category", currentCategory);
                    stationDiv.setAttribute("data-name", station.name);
                    stationDiv.setAttribute("data-url", station.url);
                    stationDiv.setAttribute("data-app", station.app || "");
                    stationDiv.setAttribute("data-logo", station.logo);

                    if (station.songInfo) stationDiv.setAttribute("data-song-info", station.songInfo);
                    if (station.channelUrl) stationDiv.setAttribute("data-channel-url", station.channelUrl);

                    stationsGrid.appendChild(stationDiv);

                    const logo = document.createElement("img");
                    logo.src = station.logo;
                    logo.alt = `${station.name} logo`;
                    logo.classList.add("station-logo");
                    logo.dataset.fallback = station.logo || "";
                    logo.onerror = () => {
                        // Fall tilbake til stasjonens egen logo, ikke skjul (unngår "henger igjen"-følelse)
                        if (logo.src !== logo.dataset.fallback && logo.dataset.fallback) {
                            logo.src = logo.dataset.fallback;
                        } else {
                            logo.style.display = "none";
                        }
                    };
                    stationDiv.appendChild(logo);

                    const name = document.createElement("div");
                    name.classList.add("station-name");
                    name.textContent = station.name;
                    stationDiv.appendChild(name);

                    const spillelisteButton = document.createElement("button");
                    spillelisteButton.className = "spilleliste-button";
                    spillelisteButton.textContent = "♪ Legg til i Spilleliste";
                    spillelisteButton.onclick = async (e) => {
                        e.stopPropagation();
                        try {
                            const artist = currentMetadata?.artist || "Ukjent artist";
                            const title = currentMetadata?.title || "Ukjent tittel";
                            const response = await fetch('https://anthonsen.net/api/add-to-spilleliste', {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({ artist, title })
                            });
                            if (response.ok) {
                                spillelisteButton.textContent = "✓ Lagt til";
                                setTimeout(() => { spillelisteButton.textContent = "♪ Legg til i Spilleliste"; }, 3000);
                            }
                        } catch (error) {
                            console.error("Feil:", error);
                        }
                    };
                    stationDiv.appendChild(spillelisteButton);

                    stationDiv.addEventListener("click", () => togglePlayStation(station.url, stationDiv));
                });
            });

            const lastStation = JSON.parse(localStorage.getItem('lastStation'));
            if (lastStation?.category) {
                showStations(lastStation.category);
            } else {
                showStations('NRK');
            }
        })
        .catch(error => {
            console.error('Kunne ikke laste stasjoner:', error);
            showStations('NRK');
        });

    // ===== WEBSOCKET =====
    let wsRetryCount = 0;
    const WS_MAX_RETRIES = 50;          // Høyere – bilkjøring kan ha mange dropout
    let wsRetryTimer = null;
    let metadataTimeout = null;
    let metadataTimeoutAttempts = 0;
    let wsHeartbeatTimer = null;
    let wsPongDeadline = null;
    let wsLastMessageAt = 0;
    let wsConnectedAt = 0;
    let lastWsArgs = null;              // { url, stationDiv, station, app } for re-connect

    /**
     * Reparerer nasjonale tegn i ICY/Shoutcast-metadata.
     * ICY sender ofte Latin-1 (ISO-8859-1) eller Windows-1252, men strømmen
     * kan også være UTF-8 som ble feiltolket som Latin-1 ("mojibake", f.eks.
     * "Ã¦" i stedet for "æ"). Funksjonen håndterer begge tilfeller + HTML-
     * entiteter (&amp;, &#229;, &aring; osv.) trygt og idempotent.
     */
    function fixEncoding(input) {
        if (input == null) return input;
        let s = String(input);
        if (!s) return s;

        // 1) Dekod HTML-entiteter (&amp;, &#229;, &aring;, &#x00E5; ...)
        if (s.indexOf('&') !== -1) {
            try {
                const tmp = document.createElement('textarea');
                tmp.innerHTML = s;
                s = tmp.value;
            } catch (_) { /* ignore */ }
        }

        // 2) Reparer mojibake: UTF-8-bytes feiltolket som Latin-1/CP1252.
        const mojibakeRe = /[ÃÂâðï]/;
        if (mojibakeRe.test(s)) {
            try {
                const bytes = new Uint8Array(s.length);
                let ok = true;
                for (let i = 0; i < s.length; i++) {
                    const c = s.charCodeAt(i);
                    if (c > 0xFF) { ok = false; break; }
                    bytes[i] = c;
                }
                if (ok) {
                    const decoded = new TextDecoder('utf-8', { fatal: true }).decode(bytes);
                    const score = (str) => (str.match(/[ÃÂâðï]/g) || []).length
                                         - (str.match(/[æøåÆØÅéèêëàáâüöäÜÖÄß]/g) || []).length;
                    if (score(decoded) < score(s)) s = decoded;
                }
            } catch (_) { /* ikke gyldig UTF-8 — la s stå */ }
        }

        // 3) Rydd opp i NBSP og kontrolltegn
        s = s.replace(/\u00A0/g, ' ').replace(/[\u0000-\u0008\u000B-\u001F\u007F]/g, '');

        return s.trim();
    }

    function startMetadataTimeout() {
        if (metadataTimeout) clearTimeout(metadataTimeout);
        const sessionAtStart = wsSession; // FIX: bind til denne sessionen
        metadataTimeout = setTimeout(() => {
            if (sessionAtStart !== wsSession) return; // stasjon byttet — drop
            const expandedDiv = document.querySelector('.station.expanded');
            if (expandedDiv && currentAudio && !currentAudio.paused) {
                metadataTimeoutAttempts++;
                console.log(`⏱️ Metadata timeout #${metadataTimeoutAttempts} - prøver på nytt...`);
                try { refreshMetadata(); } catch (e) { console.warn("refreshMetadata feilet:", e); }
                // FIX 4: Re-åpne WS hvis den er død/halvdød
                if (!ws || ws.readyState !== WebSocket.OPEN) {
                    console.log("⏱️ WS er ikke OPEN ved timeout – tvinger reconnect");
                    forceReconnectWs();
                }
                // Restart timeout slik at vi fortsetter å prøve
                startMetadataTimeout();
            }
        }, 10000);
    }

    function clearMetadataTimeout() {
        if (metadataTimeout) {
            clearTimeout(metadataTimeout);
            metadataTimeout = null;
        }
        metadataTimeoutAttempts = 0;
    }

    // FIX 1: Heartbeat – send ping hvert 15s, krev "tegn på liv" innen 30s
    function startHeartbeat() {
        stopHeartbeat();
        wsHeartbeatTimer = setInterval(() => {
            if (!ws || ws.readyState !== WebSocket.OPEN) return;
            try { ws.send(JSON.stringify({ ping: Date.now() })); } catch (e) {}
            // Hvis vi ikke har sett NOEN melding på 30s, tving reconnect
            if (Date.now() - wsLastMessageAt > 30000) {
                console.warn("💔 Ingen WS-aktivitet på 30s – tvinger reconnect");
                forceReconnectWs();
            }
            // Reset retry-counter etter 30s stabil tilkobling
            if (wsConnectedAt && Date.now() - wsConnectedAt > 30000 && wsRetryCount > 0) {
                wsRetryCount = 0;
            }
        }, 15000);
    }
    function stopHeartbeat() {
        if (wsHeartbeatTimer) { clearInterval(wsHeartbeatTimer); wsHeartbeatTimer = null; }
    }

    function forceReconnectWs() {
        if (!lastWsArgs || !currentAudio || currentAudio.paused) return;
        // FIX: ikke reconnect mot en stasjon som ikke lenger er den vi spiller
        if (lastWsArgs.url !== currentlyPlayingUrl) return;
        try { if (ws) { ws.onmessage = null; ws.onclose = null; ws.close(); } } catch (e) {}
        ws = null;
        wsRetryCount = 0;
        setupWebSocket(lastWsArgs.url, lastWsArgs.stationDiv, lastWsArgs.station, lastWsArgs.app);
    }

    function setupWebSocket(url, stationDiv, station, app) {
        // FIX 5: lukk gammel WS synkront og rydd heartbeat
        if (ws) {
            try { ws.onmessage = null; ws.onclose = null; ws.onerror = null; ws.close(); } catch (e) {}
            ws = null;
        }
        stopHeartbeat();
        clearMetadataTimeout();
        // Nullstill cache-nøkkel ved stasjonsbytte
        lastTrackKey = '';
        if (wsRetryTimer) {
            clearTimeout(wsRetryTimer);
            wsRetryTimer = null;
        }
        lastWsArgs = { url, stationDiv, station, app };

        // FIX: bump session — alle tidligere callbacks blir nå ugyldige
        const mySession = ++wsSession;

        const appValue = typeof app === 'string' && app ? app : (typeof station?.app === 'string' && station.app ? station.app : "");

        function connect() {
            if (mySession !== wsSession) return; // stasjon byttet før vi rakk å koble
            try {
                ws = new WebSocket('wss://anthonsen.net/wss');
            } catch (error) {
                console.error("Kunne ikke opprette WebSocket:", error);
                scheduleRetry(url, stationDiv, station, appValue, mySession);
                return;
            }

            ws.onopen = function() {
                if (mySession !== wsSession) { try { this.close(); } catch(e){} return; }
                wsRetryCount = 0;
                wsConnectedAt = Date.now();
                wsLastMessageAt = Date.now();
                const message = JSON.stringify({ url: url, app: appValue });
                this.send(message);
                startMetadataTimeout(); // Start timeout for metadata
                startHeartbeat();       // FIX 1
            };

            ws.onmessage = (event) => {
                if (mySession !== wsSession) return; // ignorer sene meldinger fra forrige stasjon
                wsLastMessageAt = Date.now(); // FIX 1: ethvert tegn på liv teller
                try {
                    const data = JSON.parse(event.data);
                    if (data && data.pong) return; // ignorer pong-svar
                    // FIX: bare skriv til DENNE stasjonens div, ikke "hvilken som helst expanded"
                    if (!stationDiv.classList.contains('expanded')) return;
                    const expandedDiv = stationDiv;

                    if (data.StreamTitle && (data.StreamTitle.includes('https @') || data.StreamTitle.includes('Metadata update'))) {
                        let metadataDiv = expandedDiv.querySelector('.metadata');
                        if (!metadataDiv) {
                            metadataDiv = document.createElement('div');
                            metadataDiv.className = 'metadata';
                            expandedDiv.appendChild(metadataDiv);
                        }
                        metadataDiv.innerHTML = '<p style="font-style: italic; color: #64748b;">Henter lydstrøm og metadata...</p>';
                        return;
                    }

                    // Valid metadata received - clear timeout
                    clearMetadataTimeout();

                    if (data.lyrics) {
                        // FIX H: re-trigge lyrics for HVER melding, ikke bare ved første play
                        if (currentAudio && !currentAudio.paused) {
                            startLyricsRotation(data.lyrics);
                        } else if (currentAudio) {
                            const lyricsToStart = data.lyrics;
                            currentAudio.addEventListener('play', () => {
                                startLyricsRotation(lyricsToStart);
                            }, { once: true });
                        }
                    }

                    const metadata = {
                        title: fixEncoding(data.title || data.StreamTitle?.split(' - ')[1] || ''),
                        artist: fixEncoding(data.artist || data.StreamTitle?.split(' - ')[0] || ''),
                        album: fixEncoding(data.album || ''),
                        program: fixEncoding(data.program || ''),
                        imageUrl: data.imageUrl || station?.logo || '',
                        releaseDate: data.releaseDate || null,
                        duration: data.duration || null,
                        popularity: data.popularity || null,
                        artistPicture: data.artistPicture || null,
                        explicit: data.explicit || false
                    };

                    // Cache: hvis sangen er IDENTISK med forrige melding, hopp over
                    // re-render av DOM, document.title, mediaSession og logo-bytte.
                    // Dette unngår "blinking" og unødvendige Deezer-relaterte effekter
                    // når proxyen sender samme StreamTitle på nytt.
                    const trackKey = `${metadata.artist}|${metadata.title}|${metadata.album}`;
                    if (trackKey === lastTrackKey && trackKey !== '||') {
                        // Samme sang som sist — bare oppdater currentMetadata og gå ut.
                        currentMetadata = metadata;
                        return;
                    }
                    lastTrackKey = trackKey;

                    currentMetadata = metadata;

                    const spillelisteButton = document.getElementById("spillelisteAddButton");
                    if (spillelisteButton) {
                        if (metadata.artist && metadata.title) {
                            spillelisteButton.style.display = "inline-block";
                            spillelisteButton.onclick = async (e) => {
                                e.preventDefault();
                                try {
                                    spillelisteButton.textContent = "Legger til...";
                                    const response = await fetch('https://anthonsen.net/api/add-to-spilleliste', {
                                        method: 'POST',
                                        headers: { 'Content-Type': 'application/json' },
                                        body: JSON.stringify({ artist: metadata.artist, title: metadata.title })
                                    });
                                    if (response.ok) {
                                        spillelisteButton.textContent = "✓ Lagt til";
                                        setTimeout(() => { spillelisteButton.textContent = "Legg til i Spilleliste"; }, 3000);
                                    }
                                } catch (error) {
                                    console.error("Feil:", error);
                                    spillelisteButton.textContent = "✗ Feil";
                                    setTimeout(() => { spillelisteButton.textContent = "Legg til i Spilleliste"; }, 3000);
                                }
                            };
                        } else {
                            spillelisteButton.style.display = "none";
                        }
                    }

                    let metadataDiv = expandedDiv.querySelector('.metadata');
                    if (!metadataDiv) {
                        metadataDiv = document.createElement('div');
                        metadataDiv.className = 'metadata';
                        metadataDiv.style.display = 'block';
                        metadataDiv.style.padding = '10px';
                        expandedDiv.appendChild(metadataDiv);
                    }

                    const stationName = station?.name || expandedDiv.dataset.name || "Radioportal";
                    const content = [];

                    if (stationName) content.push(`<p class="station-myname">${stationName}</p>`);
                    if (data.program) content.push(`<p>Program: ${data.program}</p>`);

                    if (data.artist === "Program") data.artist = null;
                    if (metadata.title) content.push(`<p>Tittel: ${metadata.title}</p>`);
                    if (metadata.artist) content.push(`<p>Artist: ${metadata.artist}</p>`);
                    if (metadata.album) content.push(`<p>Album: ${metadata.album}</p>`);
                    if (data.releaseDate) content.push(`<p>Utgivelsesdato: ${data.releaseDate}</p>`);

                    if (data.duration) {
                        const minutes = Math.floor(data.duration / 60000);
                        const seconds = Math.floor((data.duration % 60000) / 1000);
                        content.push(`<p>Varighet: ${minutes}:${seconds.toString().padStart(2, '0')}</p>`);
                    }

                    if (data.popularity != null) {
                        const p = data.popularity;
                        let desc = "Ukjent popularitet";
                        if (p > 900000) desc = "Kjempe populær";
                        else if (p > 800000) desc = "Veldig populær";
                        else if (p > 500000) desc = "Populær";
                        else if (p > 300000) desc = "Moderat populær";
                        else if (p > 100000) desc = "Mindre populær";
                        else if (p > 50000) desc = "Lite populær";
                        else if (p > 10000) desc = "Ikke særlig populær";
                        else if (p > 1000) desc = "Hvorfor lytte på dette??";
                        else desc = "Lite spilt";
                        content.push(`<p>Popularitet: ${p} (${desc})</p>`);
                    }

                    if (data.artistPicture) {
                        content.push(`<img src="${data.artistPicture}" alt="Artist bilde" style="width: 100px; height: 100px; border-radius: 50%; margin: 10px 0;">`);
                    }
                    if (data.explicit) {
                        content.push(`<p style="color: #ef4444; font-weight: bold;">⚠️ Eksplisitt innhold</p>`);
                    }

                    metadataDiv.innerHTML = content.join('');

                    let backgroundImageUrl = data.imageUrl?.split(",")[0].trim() || (station?.logo || "");
                    const finalImageUrl = backgroundImageUrl.replace(/%22|"/g, '').replace(/\s+/g, '').trim();
                    // FIX C: bruk EKSPLISITT .station-logo (ikke første <img> – det kan være artist-portrettet)
                    const logoElement = expandedDiv.querySelector('img.station-logo') || expandedDiv.querySelector('img');
                    if (logoElement && finalImageUrl) {
                        // FIX E: onerror -> tilbake til stasjonens egen logo, aldri "henger igjen"
                        const stationFallback = station?.logo || logoElement.dataset.fallback || "";
                        logoElement.onerror = () => {
                            if (logoElement.src !== stationFallback && stationFallback) {
                                logoElement.src = stationFallback;
                            }
                        };
                        if (logoElement.src !== finalImageUrl) {
                            logoElement.src = finalImageUrl;
                        }
                        logoElement.style.display = "inline";
                    }
                    // Speil til footer-logo også
                    const footerLogo = document.getElementById("station-logo");
                    if (footerLogo && finalImageUrl) {
                        const footerFallback = station?.logo || "";
                        footerLogo.onerror = () => {
                            if (footerLogo.src !== footerFallback && footerFallback) {
                                footerLogo.src = footerFallback;
                            }
                        };
                        if (footerLogo.src !== finalImageUrl) {
                            footerLogo.src = finalImageUrl;
                        }
                        footerLogo.style.display = "inline";
                    }

                    document.title = data.StreamTitle ? `${stationName} - ${fixEncoding(data.StreamTitle)}` : stationName;

                    if ('mediaSession' in navigator && currentAudio) {
                        try {
                            navigator.mediaSession.metadata = new MediaMetadata({
                                title: metadata.title || fixEncoding(data.StreamTitle) || "Ukjent tittel",
                                artist: metadata.artist || stationName || "Radioportal",
                                album: metadata.album || fixEncoding(data.program) || "Radio",
                                artwork: finalImageUrl ? [
                                    { src: finalImageUrl, sizes: '96x96', type: 'image/jpeg' },
                                    { src: finalImageUrl, sizes: '128x128', type: 'image/jpeg' },
                                    { src: finalImageUrl, sizes: '256x256', type: 'image/jpeg' },
                                    { src: finalImageUrl, sizes: '512x512', type: 'image/jpeg' }
                                ] : []
                            });
                        } catch (mediaErr) {
                            console.warn("mediaSession.metadata feilet (ignorert):", mediaErr);
                        }
                    }
                } catch (error) {
                    console.error("Feil ved WebSocket-data:", error);
                }
            };

            ws.onerror = () => {
                if (mySession !== wsSession) return;
                console.error("WebSocket-tilkoblingsfeil");
            };

            ws.onclose = (event) => {
                if (mySession !== wsSession) return; // gammel session — ikke retry
                console.log("WebSocket lukket:", event.code, event.reason);
                ws = null;
                stopHeartbeat();
                if (event.code !== 1000 && currentAudio && !currentAudio.paused) {
                    scheduleRetry(url, stationDiv, station, appValue, mySession);
                }
            };
        }

        connect();
    }

    function scheduleRetry(url, stationDiv, station, appValue, sessionAtSchedule) {
        if (sessionAtSchedule !== undefined && sessionAtSchedule !== wsSession) return;
        if (wsRetryCount >= WS_MAX_RETRIES) {
            console.error("WebSocket: maks antall retry oppnådd");
            return;
        }
        wsRetryCount++;
        const delay = Math.min(1000 * Math.pow(2, wsRetryCount), 10000);
        console.log(`WebSocket: prøver igjen om ${delay}ms (forsøk ${wsRetryCount}/${WS_MAX_RETRIES})`);
        wsRetryTimer = setTimeout(() => {
            if (sessionAtSchedule !== undefined && sessionAtSchedule !== wsSession) return;
            setupWebSocket(url, stationDiv, station, appValue);
        }, delay);
    }

    function ensureWsAlive(reason) {
        if (!currentAudio || currentAudio.paused) return;
        if (ws && ws.readyState === WebSocket.OPEN) return;
        console.log(`🔄 Re-kobler WebSocket (${reason})`);
        const expandedDiv = document.querySelector('.station.expanded');
        if (!expandedDiv) return;
        const url = expandedDiv.getAttribute("data-url");
        const category = expandedDiv.getAttribute("data-category");
        const station = stationsData[category]?.find(s => s.url === url);
        wsRetryCount = 0;
        setupWebSocket(url, expandedDiv, station, expandedDiv.getAttribute("data-app"));
        startMetadataTimeout();
    }

    document.addEventListener('visibilitychange', () => {
        if (document.visibilityState === 'visible') ensureWsAlive('visibilitychange');
    });
    // FIX 7: bilbrowsere setter sjelden document.hidden – bruk flere triggere
    window.addEventListener('pageshow', () => ensureWsAlive('pageshow'));
    window.addEventListener('online', () => ensureWsAlive('online'));
    window.addEventListener('focus', () => ensureWsAlive('focus'));
    document.addEventListener('DOMContentLoaded', () => {
        // Når lyden faktisk spiller etter en pause/dropout
        document.addEventListener('play', (e) => {
            if (e.target && e.target.tagName === 'AUDIO') ensureWsAlive('audio-play');
        }, true);
    });

    // ===== LYDAVSPILLING =====
    window.stopStreaming = stopStreaming;
    window.setupWebSocketRef = () => setupWebSocket;
    function stopStreaming() {
        // FIX: bump session — ugyldiggjør ALLE pågående WS-callbacks/retries/timeouts
        wsSession++;
        lastWsArgs = null;
        stopLyricsRotation();
        clearMetadataTimeout();
        wsRetryCount = 0;
        if (wsRetryTimer) {
            clearTimeout(wsRetryTimer);
            wsRetryTimer = null;
        }
        stopHeartbeat();
        if (ws) {
            try { ws.onmessage = null; ws.onclose = null; ws.onerror = null; } catch(e){}
            try { ws.close(); } catch(e){}
            ws = null;
        }
        if (currentAudio) {
            currentAudio.pause();
            currentAudio = null;
        }
        currentlyPlayingUrl = null;
    }

    function clearMetadata(stationDiv) {
        const metadataDiv = stationDiv?.querySelector('.metadata');
        if (metadataDiv) metadataDiv.innerHTML = '';
        stopLyricsRotation();
        const lyricsContainer = document.getElementById("lyrics-container");
        if (lyricsContainer) lyricsContainer.innerHTML = '<p>Velg en stasjon</p>';
    }

    // ===== RESET ALL STATION DATA =====
    function resetStationData(stationDiv, station) {
        // Nullstill metadata
        currentMetadata = {};
        
        // Nullstill lyrics
        stopLyricsRotation();
        const lyricsContainer = document.getElementById("lyrics-container");
        if (lyricsContainer) {
            lyricsContainer.innerHTML = '<p>Laster...</p>';
        }
        
        // Nullstill footer logo
        const footerLogo = document.getElementById("station-logo");
        if (footerLogo && station?.logo) {
            footerLogo.src = station.logo;
            footerLogo.style.display = "inline";
        } else if (footerLogo) {
            footerLogo.style.display = "none";
        }
        
        // Nullstill station card logo - tilbake til default fra stations.json
        const cardLogo = stationDiv?.querySelector('img');
        if (cardLogo && station?.logo) {
            cardLogo.src = station.logo;
        }
        
        // Nullstill metadata div
        const metadataDiv = stationDiv?.querySelector('.metadata');
        if (metadataDiv) {
            metadataDiv.innerHTML = '';
        }
        
        // Nullstill document title
        if (station?.name) {
            document.title = station.name;
        } else {
            document.title = "Radioportal";
        }
        
        // Nullstill Media Session
        if ('mediaSession' in navigator) {
            navigator.mediaSession.metadata = null;
        }
        
        // Skjul spilleliste-knapp
        const spillelisteButton = document.getElementById("spillelisteAddButton");
        if (spillelisteButton) {
            spillelisteButton.style.display = "none";
        }
    }

    async function togglePlayStation(url, stationDiv) {
    if (!stationDiv) {
        stationDiv = Array.from(document.querySelectorAll('.station')).find(div =>
            div.getAttribute("data-url") === url
        );
        if (!stationDiv) return;
    }

    // Hvis allerede expanded - collapse det
    if (stationDiv.classList.contains('expanded')) {
        stopStreaming();
        clearMetadata(stationDiv);
        stationDiv.classList.remove('expanded');
        
        // Nullstill metadata div FØR du fjerner style
        const metadataDiv = stationDiv.querySelector('.metadata');
        if (metadataDiv) metadataDiv.innerHTML = '';
        
        // SÅ fjern styles
        stationDiv.removeAttribute('style');
        return;
    }

    const category = stationDiv.getAttribute("data-category");
    let station = stationsData[category]?.find(s => s.url === url);

    if (!station && category === "Favoritter") {
        const favorites = JSON.parse(localStorage.getItem("favorites")) || [];
        const favStation = favorites.find(fav => fav.url === url);
        if (favStation) station = stationsData[favStation.category]?.find(s => s.url === url);
    }

    if (!station) return;

    localStorage.setItem('lastStation', JSON.stringify({ category, url }));

    const previousExpanded = document.querySelector('.station.expanded');
    if (previousExpanded) {
        previousExpanded.classList.remove('expanded');
        const metadataDiv = previousExpanded.querySelector('.metadata');
        if (metadataDiv) metadataDiv.innerHTML = '';
        previousExpanded.removeAttribute('style');
    }

    if (currentAudio && url === currentlyPlayingUrl) {
        stopStreaming();
        clearMetadata(stationDiv);
        stationDiv.classList.remove('expanded');
        const metadataDiv = stationDiv.querySelector('.metadata');
        if (metadataDiv) metadataDiv.innerHTML = '';
        stationDiv.removeAttribute('style');
        return;
    }

    if (currentAudio) {
        currentAudio.pause();
        currentAudio = null;
        currentlyPlayingUrl = null;
        stopStreaming();
        // FIX D: lukk gammel WS synkront for å unngå sene meldinger fra forrige stasjon
        if (ws) { try { ws.onmessage = null; ws.close(); } catch (e) {} ws = null; }
        stopHeartbeat();
        clearMetadataTimeout();
        const prevDiv = document.querySelector('.expanded');
        if (prevDiv) {
            prevDiv.classList.remove('expanded');
            const metadataDiv = prevDiv.querySelector('.metadata');
            if (metadataDiv) metadataDiv.innerHTML = '';
            prevDiv.removeAttribute('style');
        }
    }

    stationDiv.classList.add('expanded');
    stationDiv.style.gridRow = '1';
    stationDiv.style.gridColumn = '1 / -1';

    currentlyPlayingUrl = url;

    // ===== SONOS ROUTING =====
    if (window.currentOutputMode === 'sonos' && typeof window.sonosSendToActive === 'function') {
        window.sonosSendToActive(url).then(ok => {
            if (ok) {
                // Sonos spiller; vi kjører WS for metadata også
                setupWebSocket(url, stationDiv, station, station.app);
            } else {
                // Fallback til lokal
                console.warn('Sonos feilet – faller tilbake til lokal');
                window.currentOutputMode = 'local';
                if (typeof window.sonosUpdateOutputIndicator === 'function') window.sonosUpdateOutputIndicator();
                currentAudio = new Audio(url);
                currentAudio.play()
                    .then(() => setupWebSocket(url, stationDiv, station, station.app))
                    .catch(err => console.error("Avspillingsfeil:", err));
            }
        });
        updateFooter(station);
        return;
    }

    currentAudio = new Audio(url);
    currentAudio.play()
        .then(() => {
            setupWebSocket(url, stationDiv, station, station.app);
        })
        .catch(err => console.error("Avspillingsfeil:", err));

    updateFooter(station);
}

    // ===== FAVORITTER =====
    function isFavorite(url) {
        const favorites = JSON.parse(localStorage.getItem("favorites")) || [];
        return favorites.some(fav => fav.url === url);
    }

    function toggleFavorite(url, category) {
        const favorites = JSON.parse(localStorage.getItem("favorites")) || [];
        const index = favorites.findIndex(fav => fav.url === url);
        if (index !== -1) {
            favorites.splice(index, 1);
        } else {
            favorites.push({ url, category });
        }
        localStorage.setItem("favorites", JSON.stringify(favorites));
        updateFavoritesSidebar();
    }

    function updateFavoritesSidebar() {
        const favorites = JSON.parse(localStorage.getItem("favorites")) || [];
        let favoriteButton = sidebar.querySelector('button[data-category="Favoritter"]');
        if (!favoriteButton) {
            favoriteButton = document.createElement("button");
            favoriteButton.textContent = "Favoritter";
            favoriteButton.setAttribute("data-category", "Favoritter");
            favoriteButton.onclick = () => showStations("Favoritter");
            sidebar.prepend(favoriteButton);
        }
        favoriteButton.disabled = favorites.length === 0;
    }

    // ===== VIS STASJONER =====
    function showStations(category) {
        stationsGrid.innerHTML = "";

        const stations = category === "Favoritter"
            ? (JSON.parse(localStorage.getItem("favorites")) || []).map(fav => {
                return stationsData[fav.category]?.find(station => station.url === fav.url);
            }).filter(Boolean)
            : stationsData[category];

        if (stations && stations.length > 0) {
            stations.forEach(station => {
                const stationDiv = document.createElement("div");
                stationDiv.classList.add("station");
                stationDiv.setAttribute("data-category", category);
                stationDiv.setAttribute("data-url", station.url);
                stationDiv.setAttribute("data-app", station.app || "");
                stationDiv.setAttribute("data-name", station.name || "");

                if (station.logo) {
                    const logo = document.createElement("img");
                    logo.src = station.logo;
                    logo.alt = `${station.name} logo`;
                    logo.className = "station-logo";
                    logo.onerror = () => { logo.style.display = "none"; };
                    stationDiv.appendChild(logo);
                }

                const name = document.createElement("div");
                name.classList.add("station-name");
                name.textContent = station.name;
                stationDiv.appendChild(name);

                const favoriteButton = document.createElement("button");
                favoriteButton.classList.add("favorite-button");
                favoriteButton.textContent = isFavorite(station.url) ? "★" : "☆";
                favoriteButton.onclick = (e) => {
                    e.stopPropagation();
                    toggleFavorite(station.url, category);
                    favoriteButton.textContent = isFavorite(station.url) ? "★" : "☆";
                };
                stationDiv.appendChild(favoriteButton);

                stationDiv.onclick = () => togglePlayStation(station.url, stationDiv);
                stationsGrid.appendChild(stationDiv);
            });
        } else {
            stationsGrid.innerHTML = '<p style="color: var(--text-secondary); text-align: center; padding: 2rem;">Ingen stasjoner funnet.</p>';
        }
    }

    // ===== FOOTER =====
    function updateFooter(station) {
        const logoElement = document.getElementById("station-logo");
        const lyricsContainer = document.getElementById("lyrics-container");

        if (station) {
            if (station.logo) {
                logoElement.src = station.logo;
                logoElement.style.display = "inline";
            } else {
                logoElement.style.display = "none";
            }
            if (lyricsContainer && !lyricsContainer.dataset.activeLyrics) {
                lyricsContainer.innerHTML = '<p>Laster lyrics...</p>';
            }
        } else {
            logoElement.style.display = "none";
            if (lyricsContainer) lyricsContainer.innerHTML = '<p>Velg en stasjon</p>';
            stopLyricsRotation();
            document.title = "RADIOPORTAL";
        }
    }

    // ===== INIT =====
    document.addEventListener("DOMContentLoaded", () => {
        // Kun videresend mobile enheter basert på User Agent
        if (/Mobi|Android|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent)) {
            window.location.href = "https://anthonsen.net/mobil.html";
        }

        updateFavoritesSidebar();
        loadMenu('main');
    });
    </script>
    <!-- sonos-ui.js replaced by inline module -->
    <!-- SONOS MODAL -->
    <div class="sonos-modal" id="sonos-modal" onclick="closeSonosModal(event)">
        <div class="sonos-modal-inner" onclick="event.stopPropagation()">
            <div class="sonos-title">🔊 Sonos-høyttalere</div>
            <div class="sonos-info-banner" id="sonos-info-banner">
                Standard: lokal avspilling.<br>Velg høyttaler og trykk <b>Gjør klar</b> — neste stasjon (eller den som
                spiller nå) sendes dit automatisk.
            </div>
            <div class="sonos-volume-control">
                <span class="sonos-volume-label">🔊</span>
                <input type="range" class="sonos-volume-slider" id="sonos-volume-slider" min="0" max="100" value="30">
                <span class="sonos-volume-value" id="sonos-volume-value">30%</span>
            </div>
            <div class="sonos-device-list" id="sonos-device-list"></div>
            <div class="sonos-status" id="sonos-status"></div>
            <div class="sonos-add-form">
                <input type="text" id="sonos-new-name" placeholder="Navn (f.eks. Stue)">
                <input type="text" id="sonos-new-ip" placeholder="IP (f.eks. 192.168.1.100)">
                <button class="sonos-add-btn" onclick="addSonosDevice()">+</button>
            </div>
            <div class="sonos-buttons">
                <button class="sonos-btn sonos-cancel" onclick="closeSonosModal()">Avbryt</button>
                <button class="sonos-btn sonos-play" id="sonos-play-btn" onclick="prepareSonos()">Gjør klar</button>
            </div>
            <button class="sonos-btn sonos-stop" onclick="stopSonos()">⏹ Stopp Sonos</button>
        </div>
    </div>
    <!-- /SONOS MODAL -->

    <script>
        /* ===== SONOS MODULE (ported from mobil-2.html) ===== */
(function(){
    const SONOS_API = 'https://anthonsen.net:3738';
    const SONOS_DEVICE_KEY = 'selectedSonosDevice';
    const SONOS_DEVICES_KEY = 'sonosDevices';

    let selectedSonosDevice = localStorage.getItem(SONOS_DEVICE_KEY) || '';
    let sonosPendingDevices = selectedSonosDevice ? [selectedSonosDevice] : [];
    let sonosActiveDevices = [];
    let sonosIsPlaying = false;
    window.currentOutputMode = window.currentOutputMode || 'local';

    function fetchWithTimeout(url, opts = {}, timeout = 5000) {
        const ctrl = new AbortController();
        const t = setTimeout(() => ctrl.abort(), timeout);
        return fetch(url, { ...opts, signal: ctrl.signal }).finally(() => clearTimeout(t));
    }
    window.sonosFetchWithTimeout = fetchWithTimeout;

    function loadSonosDevices() {
        const devices = JSON.parse(localStorage.getItem(SONOS_DEVICES_KEY) || '[]');
        renderSonosDevices(devices);
    }
    function renderSonosDevices(devices) {
        const list = document.getElementById('sonos-device-list');
        if (!list) return;
        if (devices.length === 0) {
            list.innerHTML = '<div style="text-align:center;padding:18px;color:var(--text-secondary,#888);font-size:13px;">Ingen høyttalere lagt til ennå</div>';
        } else {
            list.innerHTML = devices.map(d => {
                const isSelected = selectedSonosDevice === d.ip || sonosPendingDevices.includes(d.ip);
                return `
                    <div class="sonos-device-item ${isSelected ? 'selected' : ''}">
                        <input type="checkbox" ${isSelected ? 'checked' : ''} onchange="toggleSonosDevice('${d.ip}', this.checked)">
                        <span class="sonos-device-name">${d.name} <small style="opacity:0.6;font-weight:400">(${d.ip})</small></span>
                        <button class="sonos-delete-btn" onclick="deleteSonosDevice('${d.ip}')" title="Slett">✕</button>
                    </div>`;
            }).join('');
        }
        updateSonosModalState();
    }
    window.toggleSonosDevice = function(ip, checked) {
        if (checked) {
            if (!sonosPendingDevices.includes(ip)) sonosPendingDevices.push(ip);
            selectedSonosDevice = ip;
            try { localStorage.setItem(SONOS_DEVICE_KEY, ip); } catch(e){}
        } else {
            sonosPendingDevices = sonosPendingDevices.filter(d => d !== ip);
            if (selectedSonosDevice === ip) {
                selectedSonosDevice = sonosPendingDevices[0] || '';
                if (selectedSonosDevice) localStorage.setItem(SONOS_DEVICE_KEY, selectedSonosDevice);
                else localStorage.removeItem(SONOS_DEVICE_KEY);
            }
        }
        loadSonosDevices();
    };
    window.addSonosDevice = function() {
        const nameInput = document.getElementById('sonos-new-name');
        const ipInput = document.getElementById('sonos-new-ip');
        const name = nameInput.value.trim();
        const ip = ipInput.value.trim();
        if (!name || !ip) { setSonosStatus('Fyll inn både navn og IP', 'error'); return; }
        const devices = JSON.parse(localStorage.getItem(SONOS_DEVICES_KEY) || '[]');
        if (devices.some(d => d.ip === ip)) { setSonosStatus('Denne IP-en er allerede lagt til', 'error'); return; }
        devices.push({ name, ip });
        localStorage.setItem(SONOS_DEVICES_KEY, JSON.stringify(devices));
        nameInput.value = ''; ipInput.value = '';
        setSonosStatus('Lagt til', 'success');
        loadSonosDevices();
    };
    window.deleteSonosDevice = function(ip) {
        const devices = JSON.parse(localStorage.getItem(SONOS_DEVICES_KEY) || '[]').filter(d => d.ip !== ip);
        localStorage.setItem(SONOS_DEVICES_KEY, JSON.stringify(devices));
        if (selectedSonosDevice === ip) {
            selectedSonosDevice = '';
            localStorage.removeItem(SONOS_DEVICE_KEY);
        }
        sonosPendingDevices = sonosPendingDevices.filter(d => d !== ip);
        loadSonosDevices();
    };
    window.openSonosModal = function() {
        const m = document.getElementById('sonos-modal');
        if (m) m.classList.add('active');
        loadSonosDevices();
    };
    window.closeSonosModal = function(e) {
        const m = document.getElementById('sonos-modal');
        if (!m) return;
        if (!e || e.target === m) m.classList.remove('active');
    };
    function setSonosStatus(msg, type) {
        const el = document.getElementById('sonos-status');
        if (!el) return;
        el.textContent = msg || '';
        el.className = 'sonos-status ' + (type || '');
    }
    function updateSonosModalState() {
        const playBtn = document.getElementById('sonos-play-btn');
        const banner = document.getElementById('sonos-info-banner');
        if (!playBtn || !banner) return;
        if (sonosIsPlaying) {
            playBtn.textContent = '🔄 Bytt høyttaler';
            playBtn.disabled = false;
            banner.className = 'sonos-info-banner ready';
            banner.innerHTML = '✓ Spiller på Sonos. Trykk <b>Stopp Sonos</b> for å gå tilbake til lokal.';
        } else if (sonosPendingDevices.length > 0 || selectedSonosDevice) {
            playBtn.textContent = '✓ Gjør klar';
            playBtn.disabled = false;
            banner.className = 'sonos-info-banner ready';
            banner.innerHTML = '✓ Høyttaler valgt! Trykk <b>Gjør klar</b>, så går neste stasjon dit.';
        } else {
            playBtn.textContent = 'Gjør klar';
            playBtn.disabled = true;
            banner.className = 'sonos-info-banner';
            banner.innerHTML = 'Standard: lokal avspilling.<br>Velg høyttaler og trykk <b>Gjør klar</b>.';
        }
    }
    function updateOutputIndicator() {
        const ind = document.getElementById('sonos-output-indicator');
        const btn = document.getElementById('sonos-control-btn');
        if (ind) ind.classList.toggle('active', window.currentOutputMode === 'sonos');
        if (btn) btn.classList.toggle('sonos-active', window.currentOutputMode === 'sonos');
    }
    window.sonosUpdateOutputIndicator = updateOutputIndicator;

    window.prepareSonos = async function() {
        if (!selectedSonosDevice && sonosPendingDevices.length === 0) {
            setSonosStatus('Velg minst én høyttaler!', 'error');
            return;
        }
        if (!selectedSonosDevice && sonosPendingDevices.length > 0) {
            selectedSonosDevice = sonosPendingDevices[0];
            try { localStorage.setItem(SONOS_DEVICE_KEY, selectedSonosDevice); } catch(e){}
        }
        window.currentOutputMode = 'sonos';
        updateOutputIndicator();

        // Sømnløst bytte hvis noe spiller lokalt nå
        if (window.currentlyPlayingUrl) {
            setSonosStatus('Sender til Sonos…', '');
            if (window.currentAudio) { try { window.currentAudio.pause(); } catch(e){} window.currentAudio = null; }
            const ok = await window.sonosSendToActive(window.currentlyPlayingUrl);
            if (ok) {
                setSonosStatus('✅ Spiller nå på Sonos', 'success');
                setTimeout(() => closeSonosModal(), 700);
            } else {
                setSonosStatus('⚠️ Sonos svarte ikke – prøv igjen', 'error');
                window.currentOutputMode = 'local';
                updateOutputIndicator();
            }
            return;
        }
        setSonosStatus('Klar! Velg en stasjon å spille.', 'success');
        updateSonosModalState();
        setTimeout(() => closeSonosModal(), 600);
    };

    window.stopSonos = async function() {
        await window.stopSonosOnly();
        window.currentOutputMode = 'local';
        updateOutputIndicator();
        setSonosStatus('Sonos stoppet', '');
        updateSonosModalState();
        setTimeout(() => closeSonosModal(), 600);
    };

    window.stopSonosOnly = async function() {
        const targets = (sonosActiveDevices && sonosActiveDevices.length)
            ? sonosActiveDevices
            : (selectedSonosDevice ? [selectedSonosDevice] : []);
        const tasks = targets.map(ip =>
            fetchWithTimeout(SONOS_API + '/stop', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ deviceId: ip })
            }, 4000).catch(err => console.warn('Sonos /stop feilet for', ip, err.message))
        );
        await Promise.all(tasks);
        sonosIsPlaying = false;
        sonosActiveDevices = [];
        const btn = document.getElementById('sonos-control-btn');
        if (btn) btn.classList.remove('sonos-active');
    };

    window.sonosSendToActive = async function(streamUrl) {
        if (!streamUrl) return false;
        const now = Date.now();
        if (window._lastSonosCall && (now - window._lastSonosCall) < 800) {
            return sonosIsPlaying;
        }
        window._lastSonosCall = now;
        if (window._sonosInProgress) return sonosIsPlaying;
        window._sonosInProgress = true;

        const sonosBtn = document.getElementById('sonos-control-btn');
        const origText = sonosBtn ? sonosBtn.textContent : '';
        if (sonosBtn) sonosBtn.textContent = '⏳ Sonos';

        try {
            const devices = JSON.parse(localStorage.getItem(SONOS_DEVICES_KEY) || '[]');
            let targetIp = selectedSonosDevice;
            if (!targetIp && devices.length > 0) targetIp = devices[0].ip;
            if (!targetIp) { console.warn('Sonos: ingen enhet valgt'); return false; }

            // Stopp lokal lyd
            if (window.currentAudio) { try { window.currentAudio.pause(); } catch(e){} window.currentAudio = null; }

            const slider = document.getElementById('sonos-volume-slider');
            const volume = slider ? parseInt(slider.value) : 30;

            const r = await fetchWithTimeout(SONOS_API + '/takeover', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ deviceId: targetIp, uri: streamUrl, volume })
            }, 6000);
            if (r.ok) {
                sonosIsPlaying = true;
                sonosActiveDevices = [targetIp];
                if (sonosBtn) sonosBtn.classList.add('sonos-active');
                console.log('Sonos takeover OK:', targetIp);
                updateOutputIndicator();
                return true;
            }
            console.error('Sonos takeover HTTP', r.status);
            return false;
        } catch (e) {
            console.error('Sonos takeover feilet:', e.message || e);
            return false;
        } finally {
            if (sonosBtn) sonosBtn.textContent = '🔊 Sonos';
            setTimeout(() => { window._sonosInProgress = false; }, 1200);
        }
    };

    // Volume slider
    document.addEventListener('DOMContentLoaded', () => {
        const slider = document.getElementById('sonos-volume-slider');
        const value = document.getElementById('sonos-volume-value');
        if (!slider || !value) return;
        slider.addEventListener('input', async () => {
            const volume = parseInt(slider.value);
            value.textContent = volume + '%';
            if (sonosIsPlaying && sonosActiveDevices.length > 0) {
                for (const ip of sonosActiveDevices) {
                    try {
                        let r = await fetchWithTimeout(SONOS_API + '/volume', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ deviceId: ip, volume })
                        }, 3000);
                        if (!r.ok) {
                            await fetchWithTimeout(SONOS_API + '/setVolume', {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({ deviceId: ip, volume })
                            }, 3000);
                        }
                    } catch(err) { console.warn('Volum feilet:', err.message); }
                }
            }
            if (window.currentAudio && window.currentOutputMode === 'local') {
                window.currentAudio.volume = volume / 100;
            }
        });
        // Init indicator
        updateOutputIndicator();
    });

    // ===== HOOK INTO EXISTING togglePlayStation =====
    // After Audio() creation, if mode=sonos, route there instead.
    // We monkey-patch by wrapping the global function once DOM is ready.
    const origStopStreamingName = 'stopStreaming';
    document.addEventListener('DOMContentLoaded', () => {
        // Wrap stopStreaming to also stop Sonos
        if (typeof window.stopStreaming === 'function' && !window.stopStreaming._sonosWrapped) {
            const orig = window.stopStreaming;
            window.stopStreaming = function() {
                if (window.currentOutputMode === 'sonos' && sonosIsPlaying) {
                    window.stopSonosOnly().catch(()=>{});
                }
                return orig.apply(this, arguments);
            };
            window.stopStreaming._sonosWrapped = true;
        }
    });
})();
/* ===== /SONOS MODULE ===== */
    </script>
