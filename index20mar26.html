<script>
  let lyricsIndex = 0;
  let lyricsInterval;

  function startLyricsRotation(lyricsLines) {
    stopLyricsRotation(); // Stop any existing rotation
    if (lyricsLines.length > 0) {
      lyricsInterval = setInterval(rotateAndDisplayLyrics, 5000); // Rotate every 5 seconds
      rotateAndDisplayLyrics(); // Display first pair
    }
  }

  function stopLyricsRotation() {
    clearInterval(lyricsInterval);
  }

  function rotateAndDisplayLyrics() {
    const lyricsLines = [...]; // Replace with actual lyrics lines
    const lineCount = lyricsLines.length;

    // Show 2 lines at a time
    const firstLine = lyricsLines[lyricsIndex % lineCount];
    const secondLine = lyricsLines[(lyricsIndex + 1) % lineCount];

    document.getElementById('lyrics-container').innerHTML = `<p>${firstLine}</p><p>${secondLine}</p>`;
    lyricsIndex += 2; // Move to next pair
  }
