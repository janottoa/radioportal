<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radioportal</title>
    <style>
        /* Nattdesign som standard tilpasset mobil */
        body {
            display: flex;
            flex-direction: column;
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: black;
            font-size: 16px;
        }

        .header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background-color: gray;
            padding: 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-sizing: border-box;
            color: black;
            z-index: 10;
        }

        .header-logo img {
            height: 35px;
        }

        .header-title {
            font-size: 1.4em;
            font-weight: bold;
            text-align: center;
            flex: 1;
        }

        .switch-button {
            background-color: #555;
            color: white;
            padding: 5px 10px;
            font-size: 0.9em;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s ease;
            margin-left: 5px;
        }

        .switch-button:hover {
            background-color: #666;
        }

        .container {
            display: flex;
            flex: 1;
            width: 100%;
            flex-direction: column;
            margin-top: 60px;
            padding: 10px;
        }

        .sidebar {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            background-color: #333;
            padding: 10px;
            justify-content: space-between;
        }

        .sidebar button {
            background-color: #555;
            color: white;
            border: none;
            padding: 10px;
            font-size: 0.9em;
            cursor: pointer;
            text-align: center;
            border-radius: 5px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            transition: box-shadow 0.3s ease, transform 0.3s ease;
            flex: 1 1 calc(50% - 10px);
        }

        .sidebar button:hover {
            background-color: #666;
        }

        .stations-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 10px;
            padding: 10px;
        }


        .station {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            background-color: #444;
            color: white;
            text-align: center;
            border: 1px solid #888;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            cursor: pointer;
            padding: 10px;
            transition: all 0.3s ease;
        }

        .station:hover {
            background-color: #555;
            box-shadow: 0 6px 8px rgba(0, 0, 0, 0.2);
            transform: translateY(-2px);
        }

        .station img {
            max-width: 100%;
            max-height: 60px;
            object-fit: contain;
            margin-bottom: 10px;
        }

        .station .station-name {
            font-size: 0.9em;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .station .favorite-button {
            display: block;
            background: none;
            border: none;
            color: white;
            font-size: 1.2em;
            cursor: pointer;
            transition: color 0.3s ease;
            margin-top: 5px;
        }

        .station.playing .favorite-button {
            display: none;
        }

        .station.playing {
            background-color: #222;
            border-color: #666;
            box-shadow: 0 6px 8px rgba(0, 0, 0, 0.3);
        }

        .station.playing {
            background-color: #222;
            border-color: #666;
            box-shadow: 0 6px 8px rgba(0, 0, 0, 0.3);
        }

        .station.logo-playing {
            background-size: cover; /* Logoen fyller hele knappen */
            background-position: center; /* Sentraliser logoen */
            background-repeat: no-repeat; /* Unngå gjentakelser */
            border: 1px solid #888; /* Valgfri kantlinje */
            color: transparent; /* Skjul eventuell tekst */
        }


        .station.logo-playing img {
            display: none; /* Skjul liten logo når bakgrunnslogo brukes */
        }

        .station.logo-only .station-logo {
            width: 100%; /* Logo fyller hele knappen */
            height: 100%;
            object-fit: cover; /* Logo skaleres for å passe */
        }

        .station.logo-only .station-details,
        .station.logo-only .favorite-button {
            display: none; /* Skjul tekst og favorittknapp */
        }

        .station.expanded {
            display: flex; /* Aktiver Flexbox for å arrangere innhold horisontalt */
            flex-direction: row; /* Legg logo og tekst side om side */
            align-items: flex-start; /* Juster logo og tekst til toppen */
            justify-content: flex-start; /* Plasser innhold mot venstre */
            grid-column: 1 / -1; /* Dekker hele bredden */
            grid-row: 1; /* Tving knappen til første rad */
            height: calc(100vh - 60px - 50px); /* Skjermhøyde minus header og footer */
            /*  height: calc(100vh - 60px);  Begrens høyden til skjermen minus header/footer */
            padding: 20px;
            background-color: #333;
            overflow: hidden; /* Hindrer overløp */
            height: 35vh; /* Sett høyden til 90% av skjermen for å unngå overløp */

        }

        .station.expanded .station-name {
            display: none; /* Skjul stasjonsnavnet */
        }


        station.expanded .station-name,
        .station.expanded .favorite-button {
            display: none; /* Skjul stasjonsnavn og stjerne */
        }

        .station.expanded .metadata {

            display: block; /* Vis metadata */
            font-family: Helvetica,Ubuntu, Arial, sans-serif; /* Helvetica fet */
            font-weight: bold;
            font-size: 20px;
            color: white;
            line-height: 1.2; /* Juster linjehøyden for lesbarhet */
            text-align: left;
            margin: 0; /* Fjern eventuelle unødvendige marginer */
            padding: 0; /* Fjern ekstra padding */
            align-self: flex-start; /* Sikrer at metadataen starter på toppen */
        }

        .station.expanded img {
            flex: 0 0 40%; /* Logo tar opp 30 % av bredden til containeren */
            height: auto; /* Behold proporsjonene */
            max-height: 60%; /* Ikke overskrid 60 % av knappens høyde */
            object-fit: contain; /* Unngå deformasjon */
            margin-right: 20px; /* Avstand til tekst */
            display: block;
            width: 50px; /* Angi logoens bredde */
        }


        .station .metadata {
            display: none; /* Skjul metadata i normal tilstand */
        }

        .station.expanded .metadata {

            display: block; /* Vis metadata når utvidet */
            flex: 1;
            text-align: left;
        }


        .footer {
            position: fixed;
            bottom: 0;
            width: 100%;
            background-color: gray;
            color: black;
            text-align: center;
            padding: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        #song-info {
            font-size: 1em;
            font-weight: bold;
            font-style: italic;
        }

        .footer .info {
            font-size: 0.9em;
        }

        /* Dagfarger */
        .day-mode {
            background-color: white;
        }
        .day-mode .header {
            background-color:#d3d3d3;
            color: black;
        }
        .day-mode .sidebar {
            background-color: #f0f0f0;
        }
        .day-mode .sidebar button {
            background-color: #d3d3d3;
            color: black;
        }
        .day-mode .station {
            background-color: #f9f9f9;
            color: black;
        }
        .day-mode .station:hover {
            background-color: #e0e0e0;
        }
        .day-mode .station.playing {
            background-color: #c0c0c0;
            border-color: #888;
        }
        .day-mode .footer {
            background-color: #333;
            color: white;
        }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>



</head>
<body>
<div class="header">
    <div class="header-logo">
        <img src="moffaradio.png" alt="Moffa Logo">
    </div>

    <div class="header-title">RADIOPORTAL</div>

    <div class="header-buttons">
        <button class="switch-button" onclick="toggleDayMode()">Bytt design</button>
        <button class="switch-button" onclick="refreshPage()">Refresh</button>
    </div>
</div>



<div class="container">
    <div class="sidebar" id="sidebar"></div>

    <div class="stations-grid" id="stations-grid"></div>
</div>

<div class="footer">
    <div class="info">
        <img id="station-logo" src="" alt="Stasjonslogo" style="display:none; height: 30px; margin-right: 10px;">
        <span id="channel-name"></span>
        <span id="song-info"></span>
    </div>
</div>

<script>
    function refreshPage() {
        window.location.reload();
    }

    function toggleDayMode() {
        document.body.classList.toggle('day-mode');
    }

    const sidebar = document.getElementById("sidebar");
    const stationsGrid = document.getElementById("stations-grid");

    const menus = {
        main: [
            { label: "NRK", action: () => showStations("NRK") },
            { label: "P4", action: () => showStations("P4") },
            { label: "Radio Norge", action: () => showStations("Radio Norge") },
            { label: "Metro", action: () => showStations("Metro") },
            { label: "Lokale", action: () => showStations("Lokale") },
            { label: "Internet", action: () => showStations("Internet") },
            { label: "Latinske", action: () => showStations("Latinske") },
            { label: "Mer...", action: () => loadMenu("extra") },

        ],
        extra: [
            { label: "1fm", action: () => showStations("1fm") },
            { label: "181fm", action: () => showStations("181fm") },
            { label: "Ledig..", action: () => showStations("Ledig2") },
            { label: "Sverige  ", action: () => showStations("se") },
            { label: "Danmark", action: () => showStations("dk") },
            { label: "UK", action: () => showStations("utland") },
            { label: "Tilbake", action: () => loadMenu("main") },
            { label: "Mer...", action: () => loadMenu("extra2") },
        ],
        extra2: [
            { label: "Tyskland", action: () => showStations("de") },
            { label: "USA", action: () => showStations("us") },
            { label: "Middelhavet", action: () => showStations("middelhavet") },
            { label: "Ledig..", action: () => showStations("Ledig3u") },
            { label: "Ledig..", action: () => showStations("Ledig4") },
            { label: "Ledig..", action: () => showStations("Ledig5") },
            { label: "Tilbake", action: () => loadMenu("extra") },
            { label: "Startside", action: () => loadMenu("main") },
        ],
    };
    function loadMenu(menuName) {
        const buttons = Array.from(sidebar.querySelectorAll("button")).filter(
            (button) => button.getAttribute("data-category") !== "Favoritter"
        );

        buttons.forEach((button) => button.remove());

        menus[menuName].forEach((item) => {
            const button = document.createElement("button");
            button.textContent = item.label;
            button.onclick = item.action;
            sidebar.appendChild(button);
        });
    }

    loadMenu('main');

    let stationsData = {};
    let currentlyPlayingUrl = null;
    let currentAudio = null; // Holder lydstrømmen
    let currentlyExpanded = null; // Holder utvidet stasjon
    let ws = null; // Global WebSocket-variabel
    let currentMetadata = {};
    let songStartTime = 0;
    // Eksponeres på window for sonos-ui.js
    window._currentlyPlayingUrl = null;
    window._currentAudio = null;

    // Last stationsData fra JSON-fil
    fetch('stations.json')
        .then(response => {
            if (!response.ok) {
                throw new Error(`Network response was not ok: ${response.statusText}`);
            }
            return response.json();
        })
        .then(data => {
            stationsData = data;
            showStations('NRK');
        })
        .catch(error => {
            console.error('Fetch error:', error);

            // Fallback: Vis standardkategori
            showStations('NRK');
        });

    async function togglePlayStation(url, stationDiv) {
        const category = stationDiv.getAttribute("data-category");
        let station = stationsData[category]?.find(s => s.url === url);

        // Håndter stasjoner i "Favoritter"-kategorien
        if (!station && category === "Favoritter") {
            const favorites = JSON.parse(localStorage.getItem("favorites")) || [];
            const favStation = favorites.find(fav => fav.url === url);
            if (favStation) {
                station = stationsData[favStation.category]?.find(s => s.url === url);
            }
        }

        if (!station) {
            console.error("Stasjon ikke funnet for URL:", url, "og kategori:", category);
            return;
        }

        console.log("Spiller av stasjon:", station);

        // Fjern tidligere utvidelse
        const previousExpanded = document.querySelector('.station.expanded');
        if (previousExpanded) {
            previousExpanded.classList.remove('expanded');
            previousExpanded.style.gridRow = ''; // Tilbakestill plassering
            previousExpanded.style.gridColumn = ''; // Tilbakestill plassering
            previousExpanded.style.backgroundImage = ''; // Fjern tidligere bakgrunnsbilde
            const metadataDiv = previousExpanded.querySelector('.metadata');
            if (metadataDiv) metadataDiv.innerHTML = ''; // Tøm tidligere metadata
        }

        // Hvis samme knapp trykkes igjen, stopp avspillingen og tilbakestill
        if (currentAudio && url === currentlyPlayingUrl) {
            currentAudio.pause();
            currentAudio = null;
            currentlyPlayingUrl = null;
            stationDiv.classList.remove('expanded');
            stationDiv.style.gridRow = ''; // Tilbakestill plassering
            stationDiv.style.gridColumn = ''; // Tilbakestill plassering
            stationDiv.style.backgroundImage = ''; // Fjern bakgrunnsbilde */
            updateFooter(null); // Fjern footer-info
            return;
        }


        // Stopp tidligere lydstrøm hvis aktiv
        if (currentAudio) {
            currentAudio.pause();
            currentAudio = null;
            currentlyPlayingUrl = null;
        }

        // Utvid valgt knapp
        stationDiv.classList.add('expanded');
        stationDiv.style.gridRow = '1'; // Flytt til første rad
        stationDiv.style.gridColumn = '1 / -1'; // Dekker alle kolonner

        // Start avspilling
        currentlyPlayingUrl = url;
        currentAudio = new Audio(url);
        songStartTime = Date.now();
        window._currentlyPlayingUrl = url;
        window._currentAudio = currentAudio;

        currentAudio.play()
            .then(() => {
                window._currentlyPlayingUrl = url;
                window._currentAudio = currentAudio;
                if (window.sonosSendToActive) window.sonosSendToActive(url);
                setupWebSocket(url, stationDiv, station, station.app);
            })
            .catch(err => console.error("Avspillingsfeil:", err));

        // Oppdater footer med metadata
        updateFooter(station);

        // Oppdater layout og metadata
        const metadataDiv = stationDiv.querySelector('.metadata') || document.createElement('div');
        metadataDiv.className = 'metadata';

        // Hent metadata fra RadioPlanet og Spotify
        const metadata = await fetchMetadata(url);

        if (metadata) {
            metadataDiv.innerHTML = `
            <p>P: ${station.program || ''}</p>
            <p>K: ${station.name || ''}</p>
            <p>S: ${metadata.StreamTitle || metadata.title || ''}</p>
            <p>A: ${metadata.artist || ''}</p>
            <p>PA: ${metadata.album || ''}</p>

            `;


            function cleanImageUrl(input) {
                if (!input) return '';

                // Finne URL-en og klippe bort alt etter den
                const regex = /(https?:\/\/[^\s]+?\.(jpg|jpeg|png))/; // Matcher bilde-URL
                const match = input.match(regex);

                // Hvis en match ble funnet, klipp bort eventuelle anførselstegn eller ekstra data
                if (match) {
                    const url = match[1];
                    return url.split('"')[0]; // Returner URL før første anførselstegn
                }

                return ''; // Ingen match, returner tom streng
            }

// Eksempel på hvordan du kan bruke denne funksjonen
            ws.onmessage = function(event) {
                const metadata = event.data; // Anta at metadataene kommer som en string
                const cleanedUrl = cleanImageUrl(metadata);

                if (cleanedUrl) {
                    console.log('Renset bilde-URL:', cleanedUrl);
                    // Bruk cleanedUrl til å oppdatere nettstedet ditt eller laste ned bildet
                } else {
                    console.log('Fant ingen gyldig bilde-URL.');
                }
            };

// Bruke funksjonen
            let cleanedUrl = cleanImageUrl(inputString);
            console.log(cleanedUrl); // https://ddjh0q34m0xak.cloudfront.net/mmo/MusicLibrary/5168e848-b4db-4157-baf4-97eee1c0d465.jpg

            function rensUrl(url) {
                if (!url) return '';

                // Finn posisjonen til .jpg eller .png
                const jpgIndex = url.indexOf('.jpg');
                const pngIndex = url.indexOf('.png');

                let cutoffIndex = -1;
                let extension = '';

                if (pngIndex !== -1 && (jpgIndex === -1 || pngIndex < jpgIndex)) {
                    cutoffIndex = pngIndex + 4; // Inkluder ".png"
                    extension = '.png';
                } else if (jpgIndex !== -1) {
                    cutoffIndex = jpgIndex + 4; // Inkluder ".jpg"
                    extension = '.jpg';
                }

                if (cutoffIndex !== -1) {
                    url = url.substring(0, cutoffIndex).trim();
                }

                // Fjern eventuelle anførselstegn
                url = url.replace(/["']/g, '');

                return url;
            }


            // Oppdater bilde
            const backgroundImageUrl = metadata.imageUrl || station.logo;
            const newImageUrl = station.logo;

// Rens URL-ene
            const renBakgrunn = rensUrl(backgroundImageUrl);
            const renNy = rensUrl(newImageUrl);

// Logg for å sjekke rensing
            console.log("Rå backgroundImageUrl:", backgroundImageUrl);
            console.log("Renset backgroundImageUrl:", renBakgrunn);
            console.log("Rå newImageUrl:", newImageUrl);
            console.log("Renset newImageUrl:", renNy);

// Sett bakgrunnsbilde
            if (renBakgrunn) {
                stationDiv.style.backgroundImage = `url('${renBakgrunn}')`;
                console.log("Bruker backgroundImageUrl:", renBakgrunn);
            } else {
                stationDiv.style.backgroundImage = `url('${renNy}')`;
                console.log("Bruker newImageUrl:", renNy);
            }
        }

        // Legg metadata-div til hvis det ikke allerede finnes
        if (!stationDiv.contains(metadataDiv)) {
            stationDiv.appendChild(metadataDiv);
        }

        // Oppdater favorittstjerne
        const favoriteButton = stationDiv.querySelector('.favorite-button') || document.createElement('button');
        favoriteButton.className = 'favorite-button';
        favoriteButton.textContent = isFavorite(url) ? "★" : "☆";
        favoriteButton.onclick = (e) => {
            e.stopPropagation(); // Forhindre klikk på stasjonen
            toggleFavorite(url, category);
            favoriteButton.textContent = isFavorite(url) ? "★" : "☆";
        };

        // Legg til favorittknappen hvis den ikke allerede finnes
        if (!stationDiv.contains(favoriteButton)) {
            stationDiv.appendChild(favoriteButton);
        }
    }

    // Hjelpefunksjon for å hente metadata fra RadioPlanet og Spotify
    async function fetchMetadata(url) {
        try {
            const response = await fetch(`/metadata?url=${encodeURIComponent(url)}`);
            if (!response.ok) throw new Error(`Feil ved henting av metadata: ${response.statusText}`);
            return await response.json();
        } catch (error) {
            console.error("Feil ved henting av metadata:", error);
            return null;
        }
    }

    function stopStreaming() {
        if (currentAudio) {
            currentAudio.pause();
            currentAudio = null;
        }
        currentlyPlayingUrl = null;
        if (ws) {
            ws.close();
            ws = null;
        }
        window._currentlyPlayingUrl = null;
        window._currentAudio = null;
    }

    function isFavorite(url) {
        const favorites = JSON.parse(localStorage.getItem("favorites")) || [];
        return favorites.some(fav => fav.url === url);
    }



    function updateFavoritesSidebar() {
        const favorites = JSON.parse(localStorage.getItem("favorites")) || [];
        let favoriteButton = sidebar.querySelector('button[data-category="Favoritter"]');

        if (!favoriteButton) {
            favoriteButton = document.createElement("button");
            favoriteButton.textContent = "Favoritter";
            favoriteButton.setAttribute("data-category", "Favoritter");
            favoriteButton.onclick = () => showStations("Favoritter");
            sidebar.prepend(favoriteButton); // Legg knappen fast på toppen
        }

        favoriteButton.disabled = favorites.length === 0; // Deaktiver hvis ingen favoritter
    }



    document.addEventListener("DOMContentLoaded", () => {
        updateFavoritesSidebar(); // Sett opp "Favoritter"-knappen
        loadMenu('main');         // Last hovedmenyen
    });



    function showStations(category) {
        const stationsGrid = document.getElementById("stations-grid");
        stationsGrid.innerHTML = ""; // Tøm grid

        const stations = category === "Favoritter"
            ? (JSON.parse(localStorage.getItem("favorites")) || []).map(fav => {
                return stationsData[fav.category]?.find(station => station.url === fav.url);
            }).filter(station => station) // Filtrer ut ugyldige stasjoner
            : stationsData[category];

        if (stations && stations.length > 0) {
            stations.forEach(station => {
                const stationDiv = document.createElement("div");
                stationDiv.classList.add("station");
                stationDiv.setAttribute("data-category", category);
                stationDiv.setAttribute("data-url", station.url);

                // Legg til logo
                if (station.logo) {
                    const logo = document.createElement("img");
                    logo.src = station.logo;
                    logo.alt = `${station.name} logo`;
                    logo.className = "station-logo";
                    stationDiv.appendChild(logo);
                }

                // Legg til stasjonsnavn
                const name = document.createElement("div");
                name.classList.add("station-name");
                name.textContent = station.name;
                stationDiv.appendChild(name);

                // Legg til favorittknapp
                const favoriteButton = document.createElement("button");
                favoriteButton.classList.add("favorite-button");
                favoriteButton.textContent = isFavorite(station.url) ? "★" : "☆";
                favoriteButton.onclick = (e) => {
                    e.stopPropagation(); // Forhindrer klikk på stasjonen
                    toggleFavorite(station.url, category);
                    favoriteButton.textContent = isFavorite(station.url) ? "★" : "☆";
                };
                stationDiv.appendChild(favoriteButton);

                // Legg til klikkhåndtering for stasjonen
                stationDiv.onclick = () => togglePlayStation(station.url, stationDiv);

                stationsGrid.appendChild(stationDiv);
            });
        } else {
            stationsGrid.innerHTML = `<p style="color:white;">Ingen stasjoner funnet.</p>`;
        }
    }


    // Favoritt-funksjon
    function toggleFavorite(url, category) {
        const favorites = JSON.parse(localStorage.getItem("favorites")) || [];
        const index = favorites.findIndex(fav => fav.url === url);

        if (index !== -1) {
            favorites.splice(index, 1); // Fjern fra favoritter
        } else {
            favorites.push({ url, category }); // Legg til favoritter
        }

        localStorage.setItem("favorites", JSON.stringify(favorites));
        updateFavoritesSidebar(); // Oppdater sidebar
    }



    // Oppdatert WebSocket-setup
    /* let ws; // Flyttet utenfor funksjonen for å unngå "Cannot access before initialization"-feil
*/
    function setupWebSocket(url, stationDiv, station, app) {
        if (ws) ws.close(); // Lukk eksisterende WebSocket-forbindelse
        ws = new WebSocket('ws://anthonsen.net:3080'); // Sett riktig WebSocket URL

        ws.onopen = () => {
            console.log("WebSocket åpen for URL:", url);
            ws.send(url); // Send URL for å starte metadata-strøm
        };

        ws.onmessage = (event) => {
            /* try {
                 const data = JSON.parse(event.data); // Forsøk å parse data
                 if (data && data.StreamTitle) {
                     document.title = data.StreamTitle; // Oppdaterer dashbordet med StreamTitle
                 } else {
                     console.log("Ingen StreamTitle mottatt i WebSocket-data.");
                 }
             } catch (error) {
                 console.error("Feil ved parsing av WebSocket-data:", error);
             }
         };*/
            try {
                const data = JSON.parse(event.data);
                console.log("Mottatt metadata:", data);
                document.title = data.StreamTitle;

                /* console.log(`Oppdaterer document.title: ${document.title}`);
                console.log(`Mottatt StreamTitle: ${data.StreamTitle}`); */

                // Håndter bildeoppdatering
                let backgroundImageUrl = station.logo || ""; // Bruk stasjon-logo som fallback

                if (data.imageUrl && data.imageUrl.trim()) {
                    // Rens og ekstrakt kun URL uten ekstra parametere
                    const sanitizedUrl = data.imageUrl.split(',')[0].replace(/[\x00-\x1F\x7F-\x9F"]/g, "").trim();
                    if (sanitizedUrl) {
                        backgroundImageUrl = sanitizedUrl;
                        console.log("Renset og bruker bilde fra metadata:", backgroundImageUrl);
                    } else {
                        console.log("Fant ugyldig imageUrl i metadata, bruker fallback:", backgroundImageUrl);
                    }
                } else {
                    console.log("Ingen gyldig imageUrl i metadata, bruker fallback:", backgroundImageUrl);
                }


                // Oppdater metadata i den utvidede knappen
                const metadataDiv = stationDiv.querySelector('.metadata');

                if (metadataDiv) {
                    metadataDiv.innerHTML = `
                    <p>${data.program || ''}</p>
                    <p>${station.name || ''}</p>
                    <p>${data.title || data.songTitle || ''}</p>
                    <p>${data.artist || ''}</p>
                    <p>${data.album || ' '}</p>
                    <!-- <p>${data.StreamTitle || ''}</p> -->

                     <div class="song-info">${station.songInfo || ''}</div>
         `;
                }

                const songInfoElement = document.getElementById("song-info");
                songInfoElement.textContent = data.StreamTitle;


                // Oppdater logoen i den utvidede knappen
                const logoElement = stationDiv.querySelector('img');
                if (logoElement) {
                    const newImageUrl = backgroundImageUrl; // Bruk den rensede URL-en
                    logoElement.src = newImageUrl; // Bytt logoens kilde
                    console.log("Oppdaterte logo til nytt image onmessage:", newImageUrl);
                }

            } catch (error) {
                console.error("Feil ved parsing av WebSocket-data:", error);
            }
        };

        ws.onerror = (error) => {
            console.error("WebSocket-feil:", error);
        };

        ws.onclose = () => {
            console.log("WebSocket lukket.");
        };
    }

    // Overvåk endringer i systemets lysmodus
    window.matchMedia("(prefers-color-scheme: dark)").addEventListener("change", applySystemTheme);

    function applySystemTheme(event) {
        // Legg til logikk for å endre tema basert på systemets lysmodus her
        if (event.matches) {
            // Systemet er i mørkt modus
            document.body.classList.add('dark-mode');
        } else {
            // Systemet er ikke i mørkt modus
            document.body.classList.remove('dark-mode');
        }
    }



    // Kall funksjonen ved oppstart
    document.addEventListener("DOMContentLoaded", applySystemTheme);


    function updateSongInfo(songTitle, imageUrl) {
        const songInfoElement = document.getElementById('song-info');
        songInfoElement.textContent = songTitle || "";
        const logoElement = document.getElementById('station-logo');
        if (imageUrl) {
            logoElement.src = imageUrl;
            logoElement.style.display = "inline";
        }
        const stationName = document.getElementById('channel-name').textContent;
        console.log("Før oppdatering: ", document.title);
        document.title = `${stationName}  ${songTitle || ''}`;
        console.log("Etter oppdatering: ", document.title);
    }

    function updateFooter(station, metadata = null) {
        const logoElement = document.getElementById("station-logo");
        const songInfoElement = document.getElementById("song-info");
        const channelNameElement = document.getElementById("channel-name");

        if (station) {
            console.log("Oppdaterer footer for stasjon:", station);

            // Oppdater logo
            if (station.logo) {
                logoElement.src = station.logo;
                document.logo = station.logo;
                logoElement.style.display = "inline";
                console.log("Oppdaterte logo til footer:", station.logo);
            } else {
                logoElement.style.display = "none";
                console.warn("Ingen logo funnet for stasjonen.");
            }

            // Oppdater songInfo
            if (metadata && metadata.songInfo) {
                // Bruk metadata hvis tilgjengelig
                songInfoElement.textContent = metadata.songInfo;
                console.log("Bruker metadata for songInfo:", metadata.songInfo);
            } else if (station.songInfo) {
                // Bruk songInfo fra stations.json som fallback
                songInfoElement.textContent = station.songInfo;
                console.log("Bruker songInfo fra stations.json:", station.songInfo);
            } else {
                // Ingen informasjon tilgjengelig
                songInfoElement.textContent = "Ingen informasjon tilgjengelig";
                console.warn("Ingen metadata eller songInfo tilgjengelig for stasjonen.");
            }
        } else {
            // Tilbakestill footer når ingen stasjon er valgt
            console.warn("Ingen stasjon valgt. Tilbakestiller footer.");
            logoElement.style.display = "none";
            if (channelNameElement) channelNameElement.textContent = "";
            songInfoElement.textContent = "";
        }

        // Sjekk verdien av songInfoElement for feilsøking
        console.log("Endelig verdi av songInfoElement:", songInfoElement.textContent);
    }

</script>
