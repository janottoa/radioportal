<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Radioportal</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-card: #1a1a25;
            --accent-primary: #00d4ff;
            --accent-secondary: #ff006e;
            --accent-gradient: linear-gradient(135deg, #00d4ff 0%, #7b2cbf 100%);
            --text-primary: #ffffff;
            --text-secondary: #a0a0b0;
            --text-muted: #606070;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body.day-mode {
            --bg-primary: #f0f2f5;
            --bg-secondary: #ffffff;
            --bg-card: #ffffff;
            --text-primary: #1a1a1a;
            --text-secondary: #666666;
            --text-muted: #999999;
            --glass: rgba(0, 0, 0, 0.05);
            --glass-border: rgba(0, 0, 0, 0.1);
        }

        body.day-mode::before {
            background: radial-gradient(ellipse at 20% 20%, rgba(0, 212, 255, 0.1) 0%, transparent 50%),
                        radial-gradient(ellipse at 80% 80%, rgba(255, 0, 110, 0.08) 0%, transparent 50%);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            touch-action: manipulation;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at 20% 20%, rgba(0, 212, 255, 0.08) 0%, transparent 50%),
                        radial-gradient(ellipse at 80% 80%, rgba(255, 0, 110, 0.06) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .header {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    background: var(--bg-secondary);
    border-bottom: 1px solid var(--glass-border);
    padding: 8px 10px;
    display: flex;
    align-items: center;
    gap: 8px;
    z-index: 100;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    scrollbar-width: none;
}
        .header::-webkit-scrollbar { display: none; }

       
        header-menu {
    display: flex;
    gap: 8px;
    flex: 1;
    overflow-x: auto;
    scrollbar-width: none;
    padding: 2px 0;
    margin-left: 0;
}

.header-menu::-webkit-scrollbar { display: none; }

.header-menu-btn {
    background: var(--bg-card);
    border: 1px solid var(--glass-border);
    color: var(--text-secondary);
    padding: 4px 8px;
    font-size: 0.65em;
    border-radius: 8px;
    cursor: pointer;
    white-space: nowrap;
    flex-shrink: 0;
    font-family: 'Outfit', sans-serif;
    transition: all 0.2s ease;
}

.header-menu-btn:hover {
    border-color: var(--accent-primary);
    color: var(--text-primary);
}
.header-menu-wrapper {
    display: flex;
    align-items: center;
    gap: 4px;
    flex: 1;
    min-width: 0;
}

.header-scroll-btn {
    background: var(--glass);
    border: 1px solid var(--glass-border);
    color: var(--text-primary);
    width: 28px;
    height: 28px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 0.9em;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    padding: 0;
    transition: all 0.2s ease;
}

.header-scroll-btn:hover {
    border-color: var(--accent-primary);
}

.header-more-btn {
    background: var(--glass);
    border: 1px solid var(--glass-border);
    color: var(--text-primary);
    width: 28px;
    height: 28px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 0.9em;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    margin-left: auto;
    padding: 0;
    transition: all 0.2s ease;
}

.header-more-menu {
    display: none;
    position: absolute;
    top: 100%;
    right: 8px;
    background: var(--bg-secondary);
    border: 1px solid var(--glass-border);
    border-radius: 12px;
    padding: 8px;
    z-index: 200;
    min-width: 120px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
}

.header-more-menu.active {
    display: block;
}

.header-more-menu .switch-button {
    display: block;
    width: 100%;
    text-align: left;
    margin-bottom: 4px;
    padding: 6px 10px;
    font-size: 0.7em;
}

.header-more-menu .switch-button:last-child {
    margin-bottom: 0;
}

.switch-button {
    background: var(--glass);
    border: 1px solid var(--glass-border);
    color: var(--text-primary);
    padding: 5px 8px;
    font-size: 0.7em;
    border-radius: 12px;
    cursor: pointer;
    font-family: 'Outfit', sans-serif;
    white-space: nowrap;
    flex-shrink: 0;
    transition: all 0.2s ease;
}


        @media (max-width: 400px) {
            .switch-button { display: none; }
        }

        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            padding: 52px 8px 70px;
        }

        .stations-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(25%, 1fr));
    gap: 8px;
    padding: 6px;
}

.station {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: var(--bg-card);
    border: 1px solid var(--glass-border);
    border-radius: 10px;
    padding: 5%;
    cursor: pointer;
    transition: all 0.2s ease;
    aspect-ratio: 1 / 1;
}
        .station:active { transform: scale(0.96); }

        .station:hover {
            border-color: var(--accent-primary);
            box-shadow: 0 4px 15px rgba(0, 212, 255, 0.15);
        }

        .station img {
    width: 50%;
    height: 50%;
    object-fit: cover;
    border-radius: 8px;
    margin-bottom: 8%;
}

.station .favorite-button {
    background: none;
    border: none;
    color: var(--text-muted);
    font-size: 1em;
    cursor: pointer;
    margin-top: 4%;
    padding: 0;
}

        .station.expanded {
            display: flex;
            flex-direction: row;
            align-items: flex-start;
            grid-column: 1 / -1;
            background: var(--bg-secondary);
            border: 1px solid var(--accent-primary);
            border-radius: 12px;
            padding: 12px;
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.2);
            animation: expandIn 0.25s ease;
            gap: 12px;
            max-height: 40vh;
            overflow-y: auto;
        }

        @keyframes expandIn {
            from { opacity: 0; transform: scale(0.97); }
            to { opacity: 1; transform: scale(1); }
        }

        .station.expanded img {
            width: 60px;
            height: 60px;
            border-radius: 10px;
            flex-shrink: 0;
        }

        .station.expanded .station-info {
            flex: 1;
            min-width: 0;
        }

        .station.expanded .station-name {
            font-family: 'Space Mono', monospace;
            font-size: 0.95em;
            font-weight: 700;
            margin-bottom: 6px;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .station.expanded .metadata {
            display: block;
            color: var(--text-secondary);
            font-size: 0.8em;
            line-height: 1.4;
            text-align: left;
        }

        .lyrics-preview {
            margin-top: 8px;
            padding: 8px;
            background: var(--glass);
            border-radius: 8px;
            border: 1px solid var(--glass-border);
        }

        .lyrics-preview .current-lyric {
            font-size: 0.85em;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 4px;
        }

        .lyrics-preview .next-lyric {
            font-size: 0.75em;
            color: var(--text-muted);
        }

        .full-lyrics-btn {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: var(--accent-gradient);
            border: none;
            color: white;
            padding: 8px 14px;
            font-size: 0.8em;
            font-weight: 600;
            border-radius: 16px;
            cursor: pointer;
            margin-top: 10px;
            font-family: 'Outfit', sans-serif;
            transition: all 0.2s ease;
        }

        .offset-controls {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-top: 10px;
            padding: 6px 10px;
            background: var(--glass);
            border-radius: 14px;
            width: fit-content;
        }

        .offset-controls button {
            background: var(--bg-card);
            border: 1px solid var(--glass-border);
            color: var(--text-primary);
            width: 28px;
            height: 28px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 0.9em;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .offset-controls #offset-display {
            font-family: 'Space Mono', monospace;
            font-size: 0.75em;
            min-width: 35px;
            text-align: center;
            color: var(--accent-primary);
        }

        .footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--bg-secondary);
            border-top: 1px solid var(--glass-border);
            padding: 8px 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .footer .info {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.75em;
            max-width: 100%;
        }

        #station-logo {
            height: 22px;
            border-radius: 4px;
            flex-shrink: 0;
        }

        #channel-name {
            font-weight: 600;
            color: var(--accent-primary);
            font-size: 0.85em;
        }

        #song-info {
            font-style: italic;
            color: var(--text-secondary);
            font-size: 0.75em;
            max-width: 120px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .spilleliste-button {
            background: #2d7d46 !important;
            color: white !important;
            border: none !important;
            border-radius: 14px !important;
            padding: 6px 10px !important;
            font-size: 0.7em !important;
            font-weight: 600 !important;
            margin-top: 6px !important;
            cursor: pointer !important;
            width: 100%;
        }

        .lyrics-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--bg-primary);
            z-index: 200;
            overflow-y: auto;
            padding: 12px;
        }

        .lyrics-modal.active { display: block; }

        .lyrics-modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--glass-border);
            position: sticky;
            top: 0;
            background: var(--bg-primary);
            z-index: 10;
        }

        .lyrics-modal-title {
            font-family: 'Space Mono', monospace;
            font-size: 1em;
            font-weight: 700;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .lyrics-close-btn {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            color: var(--text-primary);
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.1em;
        }

        .lyric-line {
            padding: 8px 10px;
            margin: 3px 0;
            border-radius: 6px;
            font-size: 0.85em;
            line-height: 1.4;
        }

        .lyric-line.active {
            background: var(--accent-gradient);
            color: white;
            font-weight: 600;
        }

        .lyric-line.past { color: var(--text-muted); }
        .lyric-line.future { color: var(--text-secondary); }

        .no-lyrics {
            text-align: center;
            padding: 30px 15px;
            color: var(--text-muted);
            font-size: 0.85em;
        }

        @media (min-width: 600px) {
            .header { padding: 12px 20px; }
            .header-logo img { height: 36px; }
            .header-menu { gap: 10px; }
            .header-menu-btn { padding: 8px 14px; font-size: 0.8em; }
            .switch-button { padding: 8px 14px; }
            .container { padding: 70px 15px 90px; }
            .stations-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; }
            .station { padding: 15px; min-height: 160px; }
            .station img { width: 70px; height: 70px; margin-bottom: 10px; }
            .station.expanded { padding: 25px; max-height: none; overflow: visible; }
            .station.expanded img { width: 120px; height: 120px; }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-menu-wrapper">
            <button class="header-scroll-btn" id="scroll-left" onclick="scrollHeaderLeft()" style="display:none;">&#x2039;</button>
            <div class="header-menu" id="header-menu"></div>
            <button class="header-scroll-btn" id="scroll-right" onclick="scrollHeaderRight()" style="display:none;">&#x203a;</button>
        </div>
        <button class="header-more-btn" onclick="toggleHeaderMenu()">⋮</button>
        <div class="header-more-menu" id="header-more-menu">
            <button class="switch-button" onclick="toggleDayMode(); closeHeaderMenu();">☀️ Bytt</button>
            <button class="switch-button" onclick="refreshPage(); closeHeaderMenu();">🔄 Oppdater</button>
        </div>
    </div>

    <div class="container">
        <div class="stations-grid" id="stations-grid"></div>
    </div>

    <div class="footer">
        <div class="info">
            <img id="station-logo" src="" alt="Stasjonslogo" style="display:none;">
            <span id="channel-name"></span>
            <span id="song-info"></span>
        </div>
    </div>

    <div class="lyrics-modal" id="lyrics-modal">
        <div class="lyrics-modal-header">
            <div class="lyrics-modal-title">📝 Full tekst</div>
            <button class="lyrics-close-btn" onclick="closeLyricsModal()">✕</button>
        </div>
        <div class="lyrics-content" id="lyrics-content">
            <div class="no-lyrics">
                <h3>Ingen tekst tilgjengelig</h3>
                <p>Teksten vil vises her når den er tilgjengelig.</p>
            </div>
        </div>
    </div>

    <script>
        let lyricsIndex = 0;
        let lyricsInterval;
        let syncedLyricsData = [];
        let rollingLyricsData = [];
        let lyricsSyncBaseTime = 0;
        let missedTime = 0;
        let dynamicOffset = -1.5;
        let holdBackActive = false;
        const HOLD_BACK_AMOUNT = -1.5;
        const FALSE_START_THRESHOLD = 2;

        const savedOffset = parseFloat(localStorage.getItem('lyricsOffset') || '-1.5');
        dynamicOffset = (savedOffset >= -5 && savedOffset <= 5) ? savedOffset : -1.5;
        localStorage.setItem('lyricsOffset', dynamicOffset.toFixed(1));
        holdBackActive = localStorage.getItem('holdBackActive') === 'true';

        function updateOffsetDisplay() {
            const display = document.getElementById('offset-display');
            if (display) {
                const totalOffset = dynamicOffset + (holdBackActive ? HOLD_BACK_AMOUNT : 0);
                display.textContent = (totalOffset >= 0 ? '+' : '') + totalOffset.toFixed(1) + 's';
            }
        }

        function adjustLyricsOffset(deltaSeconds) {
            dynamicOffset = Math.max(-5, Math.min(5, dynamicOffset + deltaSeconds));
            localStorage.setItem('lyricsOffset', dynamicOffset.toFixed(1));
            updateOffsetDisplay();
            if (syncedLyricsData.length > 0) updateSyncedLyrics();
        }

        function toggleHoldBack() {
            holdBackActive = !holdBackActive;
            localStorage.setItem('holdBackActive', holdBackActive);
            updateOffsetDisplay();
            if (syncedLyricsData.length > 0) updateSyncedLyrics();
        }

        function parseLRC(lrcString) {
            if (!lrcString) return [];
            return lrcString.split(/\r?\n/).reduce((parsed, line) => {
                const match = line.match(/\[(\d+):(\d+\.\d+)\](.*)/);
                if (match) {
                    const seconds = parseInt(match[1]) * 60 + parseFloat(match[2]);
                    const text = match[3].trim();
                    if (text) parsed.push({ time: seconds, text });
                }
                return parsed;
            }, []);
        }

        function getSongElapsedSeconds() {
            if (!syncedLyricsData.length) return 0;
            if (lyricsSyncBaseTime === 0) return missedTime;
            return missedTime + (Date.now() - lyricsSyncBaseTime) / 1000;
        }

        function getTotalOffset() {
            return dynamicOffset + (holdBackActive ? HOLD_BACK_AMOUNT : 0);
        }

        function updateSyncedLyrics() {
            const container = document.getElementById('lyrics-container');
            if (!container || syncedLyricsData.length === 0) return;

            const totalOffset = getTotalOffset();
            const adjustedTime = Math.max(0, getSongElapsedSeconds() + totalOffset);

            let activeIndex = 0;
            for (let i = 0; i < syncedLyricsData.length; i++) {
                if (syncedLyricsData[i].time <= adjustedTime) activeIndex = i;
                else break;
            }

            const firstLine = syncedLyricsData[activeIndex]?.text || "...";
            const secondLine = syncedLyricsData[activeIndex + 1]?.text || "...";
            
            if (container.querySelector('.current-lyric')) {
                container.querySelector('.current-lyric').textContent = firstLine;
                container.querySelector('.next-lyric').textContent = secondLine;
            }
            
            updateLyricsModalHighlight(activeIndex);
        }

        function startLyricsRotation(lyrics) {
            const container = document.getElementById("lyrics-container");
            if (!container) return;

            stopLyricsRotation();

            if (lyrics.syncedLyrics && lyrics.syncedLyrics.length > 0) {
                const synced = parseLRC(lyrics.syncedLyrics);
                if (synced.length > 0) {
                    syncedLyricsData = synced;
                    rollingLyricsData = [];
                    
                    if (songStartTime > 0) {
                        missedTime = (Date.now() - songStartTime) / 1000;
                        if (missedTime < FALSE_START_THRESHOLD) missedTime = 0;
                    }
                    lyricsSyncBaseTime = Date.now();
                    updateSyncedLyrics();
                    lyricsInterval = setInterval(updateSyncedLyrics, 250);
                    updateOffsetDisplay();
                    fillLyricsModal(synced, 'synced');
                    return;
                }
            }

            container.innerHTML = `<p class="current-lyric">Ingen tekst</p><p class="next-lyric"></p>`;
            fillLyricsModal([], 'none');
        }

        let songStartTime = 0;

        function stopLyricsRotation() {
            if (lyricsInterval) { clearInterval(lyricsInterval); lyricsInterval = null; }
            syncedLyricsData = [];
            rollingLyricsData = [];
            lyricsSyncBaseTime = 0;
            missedTime = 0;
        }

        function fillLyricsModal(lyricsData, type) {
            const content = document.getElementById('lyrics-content');
            if (!content) return;

            if (!lyricsData || lyricsData.length === 0) {
                content.innerHTML = `<div class="no-lyrics"><h3>Ingen tekst tilgjengelig</h3><p>Teksten vil vises her.</p></div>`;
                return;
            }

            let html = '<div class="lyrics-list">';
            lyricsData.forEach((line, i) => {
                html += `<div class="lyric-line" data-index="${i}" data-time="${line.time || 0}">${line.text}</div>`;
            });
            html += '</div>';
            content.innerHTML = html;
        }

        function updateLyricsModalHighlight(activeIndex) {
            document.querySelectorAll('.lyric-line').forEach((el, i) => {
                el.classList.remove('active', 'past', 'future');
                if (i === activeIndex) el.classList.add('active');
                else if (i < activeIndex) el.classList.add('past');
                else el.classList.add('future');
            });
            
            const activeEl = document.querySelector('.lyric-line.active');
            if (activeEl) {
                activeEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        }

        function openLyricsModal() {
            document.getElementById('lyrics-modal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeLyricsModal() {
            document.getElementById('lyrics-modal').classList.remove('active');
            document.body.style.overflow = '';
        }

        function refreshPage() { window.location.reload(); }
        function toggleDayMode() { document.body.classList.toggle('day-mode'); }

        updateOffsetDisplay();

        const stationsGrid = document.getElementById("stations-grid");

        const menus = {
            main: [
                { label: "NRK", action: () => showStations("NRK") },
                { label: "P4", action: () => showStations("P4") },
                { label: "Radio Norge", action: () => showStations("Radio Norge") },
                { label: "Metro", action: () => showStations("Metro") },
                { label: "Norske", action: () => showStations("Lokale") },
                { label: "Mix", action: () => showStations("Internet") },
                { label: "Colombia", action: () => showStations("Colombia") },
                { label: "Mer...", action: () => loadMenu("extra") },
            ],
            extra: [
                { label: "1fm", action: () => showStations("1fm") },
                { label: "181fm", action: () => showStations("181fm") },
                { label: "HotMix", action: () => showStations("hotmix") },
                { label: "RadioTunes", action: () => showStations("radiotunes") },
                { label: "100fm", action: () => showStations("100fm") },
                { label: "Latinsk", action: () => showStations("Latinske") },
                { label: "Tilbake", action: () => loadMenu("main") },
                { label: "Mer...", action: () => loadMenu("extra2") },
            ],
            extra2: [
                { label: "UK/Irland", action: () => showStations("utland") },
                { label: "Tyskland", action: () => showStations("de") },
                { label: "Sverige", action: () => showStations("se") },
                { label: "Danmark", action: () => showStations("dk") },
                { label: "USA", action: () => showStations("us") },
                { label: "Startside", action: () => loadMenu("main") },
                { label: "Tilbake", action: () => loadMenu("extra") },
                { label: "Mer...", action: () => loadMenu("extra3") },
            ],
            extra3: [
                { label: "Spania", action: () => showStations("es") },
                { label: "Frankrike", action: () => showStations("fr") },
                { label: "Italia", action: () => showStations("it") },
                { label: "Hellas", action: () => showStations("gr") },
                { label: "Balkan", action: () => showStations("yo") },
                { label: "Startside", action: () => loadMenu("main") },
                { label: "Tilbake", action: () => loadMenu("extra2") },
                { label: "Mer...", action: () => loadMenu("extra4") },
            ],
            extra4: [
                { label: "Polen", action: () => showStations("pl") },
                { label: "Hvite Russland", action: () => showStations("by") },
                { label: "Baltic", action: () => showStations("baltic") },
                { label: "Tjekkoslovakia", action: () => showStations("tjekkia") },
                { label: "Ungarn", action: () => showStations("hu") },
                { label: "Romania/Bulgaria", action: () => showStations("Ledig10") },
                { label: "Startside", action: () => loadMenu("main") },
                { label: "Tilbake", action: () => loadMenu("extra3") },
            ],
        };

        function scrollHeaderLeft() {
            const menu = document.getElementById('header-menu');
            menu.scrollLeft -= 100;
            updateHeaderScrollButtons();
        }

        function scrollHeaderRight() {
            const menu = document.getElementById('header-menu');
            menu.scrollLeft += 100;
            updateHeaderScrollButtons();
        }

        function updateHeaderScrollButtons() {
            const menu = document.getElementById('header-menu');
            const leftBtn = document.getElementById('scroll-left');
            const rightBtn = document.getElementById('scroll-right');
            if (!menu || !leftBtn || !rightBtn) return;

            const SCROLL_END_THRESHOLD = 5;
            const isScrollable = menu.scrollWidth > menu.clientWidth;
            const isAtStart = menu.scrollLeft === 0;
            const isAtEnd = menu.scrollLeft >= (menu.scrollWidth - menu.clientWidth - SCROLL_END_THRESHOLD);

            leftBtn.style.display = isScrollable && !isAtStart ? 'flex' : 'none';
            rightBtn.style.display = isScrollable && !isAtEnd ? 'flex' : 'none';
        }

        function loadMenu(menuName) {
            updateHeaderMenu(menuName);
        }

        function updateHeaderMenu(menuName) {
            const headerMenu = document.getElementById('header-menu');
            if (!headerMenu) return;
            
            headerMenu.innerHTML = '';
            
            const currentMenu = menus[menuName] || [];
            const categories = [];
            
            currentMenu.forEach(item => {
                if (item.action && item.action.toString().includes('showStations')) {
                    const match = item.action.toString().match(/showStations\(["']([^"']+)["']\)/);
                    if (match) {
                        categories.push({ label: item.label, category: match[1] });
                    }
                }
            });

            const favorites = JSON.parse(localStorage.getItem("favorites")) || [];
            if (favorites.length > 0) {
                const favBtn = document.createElement("button");
                favBtn.className = "header-menu-btn";
                favBtn.textContent = "★";
                favBtn.title = "Favoritter";
                favBtn.onclick = () => showStations("Favoritter");
                headerMenu.appendChild(favBtn);
            }

            categories.forEach(cat => {
                const btn = document.createElement("button");
                btn.className = "header-menu-btn";
                btn.textContent = cat.label;
                btn.onclick = () => showStations(cat.category);
                headerMenu.appendChild(btn);
            });

            // Defer to allow layout to settle after DOM updates
            setTimeout(updateHeaderScrollButtons, 0);
        }

        let stationsData = {};
        let currentlyPlayingUrl = null;
        let currentAudio = null;
        let ws = null;
        let currentMetadata = {};
        window._currentlyPlayingUrl = null;
        window._currentAudio = null;

        fetch('stations.json')
            .then(response => { if (!response.ok) throw new Error(`HTTP ${response.status}`); return response.json(); })
            .then(data => {
                stationsData = data;

                Object.keys(stationsData).forEach(currentCategory => {
                    stationsData[currentCategory].forEach(station => {
                        const stationDiv = document.createElement("div");
                        stationDiv.className = "station";
                        stationDiv.setAttribute("data-category", currentCategory);
                        stationDiv.setAttribute("data-name", station.name);
                        stationDiv.setAttribute("data-url", station.url);
                        stationDiv.setAttribute("data-app", station.app || "");
                        stationDiv.setAttribute("data-logo", station.logo);

                        stationsGrid.appendChild(stationDiv);

                        const logo = document.createElement("img");
                        logo.src = station.logo;
                        logo.alt = station.name + " logo";
                        logo.onerror = () => { logo.style.display = "none"; };
                        stationDiv.appendChild(logo);

                        const spillelisteButton = document.createElement("button");
                        spillelisteButton.className = "spilleliste-button";
                        spillelisteButton.textContent = "♪ Spilleliste";
                        spillelisteButton.onclick = async (e) => {
                            e.stopPropagation();
                            try {
                                const artist = currentMetadata?.artist || "Ukjent artist";
                                const title = currentMetadata?.title || "Ukjent tittel";
                                const response = await fetch('https://anthonsen.net/api/add-to-spilleliste', {
                                    method: 'POST',
                                    headers: { 'Content-Type': 'application/json' },
                                    body: JSON.stringify({ artist, title })
                                });
                                if (response.ok) {
                                    spillelisteButton.textContent = "✓ Lagt til";
                                    setTimeout(() => { spillelisteButton.textContent = "♪ Spilleliste"; }, 3000);
                                }
                            } catch (error) {
                                spillelisteButton.textContent = "✗ Feil";
                                setTimeout(() => { spillelisteButton.textContent = "♪ Spilleliste"; }, 3000);
                            }
                        };
                        stationDiv.appendChild(spillelisteButton);

                        stationDiv.addEventListener("click", () => togglePlayStation(station.url, stationDiv));
                    });
                });

                const lastStation = JSON.parse(localStorage.getItem('lastStation'));
                showStations(lastStation?.category || 'NRK');
            })
            .catch(error => { console.error('Feil:', error); showStations('NRK'); });

        let wsRetryCount = 0;
        const WS_MAX_RETRIES = 5;
        let wsRetryTimer = null;

        function setupWebSocket(url, stationDiv, station, app) {
            if (ws) { ws.close(); ws = null; }
            if (wsRetryTimer) { clearTimeout(wsRetryTimer); wsRetryTimer = null; }

            const appValue = typeof app === 'string' && app ? app : (typeof station?.app === 'string' && station.app ? station.app : "");

            function connect() {
                try { ws = new WebSocket('wss://anthonsen.net/wss'); }
                catch (error) { scheduleRetry(url, stationDiv, station, appValue); return; }

                ws.onopen = () => {
                    wsRetryCount = 0;
                    ws.send(JSON.stringify({ url: url, app: appValue }));
                };

                ws.onmessage = (event) => {
                    try {
                        const data = JSON.parse(event.data);
                        const expandedDiv = stationDiv.classList.contains('expanded') ? stationDiv : document.querySelector('.station.expanded');
                        if (!expandedDiv) return;

                        if (data.StreamTitle && (data.StreamTitle.includes('https @') || data.StreamTitle.includes('Metadata update'))) {
                            let metadataDiv = expandedDiv.querySelector('.metadata');
                            if (!metadataDiv) { metadataDiv = document.createElement('div'); metadataDiv.className = 'metadata'; expandedDiv.appendChild(metadataDiv); }
                            metadataDiv.innerHTML = '<p style="font-style:italic;color:#888;">Laster...</p>';
                            return;
                        }

                        const metadata = {
                            title: data.title || data.StreamTitle?.split(' - ').slice(1).join(' - ').trim() || '',
                            artist: data.artist || data.StreamTitle?.split(' - ')[0]?.trim() || '',
                            album: data.album || '',
                            program: data.program || '',
                            imageUrl: data.imageUrl || station?.logo || ''
                        };

                        currentMetadata = metadata;

                        let metadataDiv = expandedDiv.querySelector('.metadata');
                        if (!metadataDiv) { metadataDiv = document.createElement('div'); metadataDiv.className = 'metadata'; expandedDiv.appendChild(metadataDiv); }

                        const stationName = station?.name || expandedDiv.dataset.name || "Radioportal";
                        let content = `<div class="station-info"><div class="station-name">${stationName}</div>`;

                        if (data.program) content += `<p>Program: ${data.program}</p>`;
                        if (data.artist === "Program") data.artist = null;
                        if (metadata.artist) content += `<p>🎤 ${metadata.artist}</p>`;
                        if (metadata.title) content += `<p>🎵 ${metadata.title}</p>`;
                        if (metadata.album) content += `<p>💿 ${metadata.album}</p>`;

                        content += `<div class="lyrics-preview" id="lyrics-container"><p class="current-lyric"><b>Vent på tekst...</b></p><p class="next-lyric"></p></div>`;
                        content += `<button class="full-lyrics-btn" id="full-lyrics-btn">📝 Full tekst</button>`;
                        content += `<div class="offset-controls"><button onclick="adjustLyricsOffset(-0.5)">-</button><span id="offset-display">0.0s</span><button onclick="adjustLyricsOffset(0.5)">+</button><button id="holdback-toggle" onclick="toggleHoldBack()">⏸ Hold</button></div>`;
                        content += `</div>`;

                        metadataDiv.innerHTML = content;
                        setTimeout(updateOffsetDisplay, 100);

                        const fullLyricsBtn = document.getElementById('full-lyrics-btn');
                        if (fullLyricsBtn) {
                            fullLyricsBtn.addEventListener('click', (e) => {
                                e.stopPropagation();
                                openLyricsModal();
                            });
                        }

                        const offsetControls = metadataDiv.querySelector('.offset-controls');
                        if (offsetControls) {
                            offsetControls.addEventListener('click', (e) => e.stopPropagation());
                        }

                        if (data.lyrics) {
                            if (currentAudio && !currentAudio.paused) {
                                startLyricsRotation(data.lyrics);
                            } else if (currentAudio) {
                                currentAudio.addEventListener('play', () => startLyricsRotation(data.lyrics), { once: true });
                            }
                        }

                        const finalImageUrl = (data.imageUrl?.split(",")[0].trim() || station?.logo || "").replace(/%22|"/g, '').replace(/\s+/g, '').trim();
                        const logoElement = expandedDiv.querySelector('img');
                        if (logoElement && finalImageUrl) logoElement.src = finalImageUrl;

                        document.title = data.StreamTitle ? `${stationName} - ${data.StreamTitle}` : stationName;

                    } catch (error) { console.error("WS-feil:", error); }
                };

                ws.onerror = () => { console.error("WS-feil"); };
                ws.onclose = (event) => {
                    ws = null;
                    if (event.code !== 1000 && currentAudio && !currentAudio.paused) scheduleRetry(url, stationDiv, station, appValue);
                };
            }

            connect();
        }

        function scheduleRetry(url, stationDiv, station, appValue) {
            if (wsRetryCount >= WS_MAX_RETRIES) return;
            wsRetryCount++;
            const delay = Math.min(1000 * Math.pow(2, wsRetryCount), 10000);
            wsRetryTimer = setTimeout(() => setupWebSocket(url, stationDiv, station, appValue), delay);
        }

        function stopStreaming() {
            stopLyricsRotation();
            if (wsRetryTimer) { clearTimeout(wsRetryTimer); wsRetryTimer = null; }
            if (ws) { ws.close(); ws = null; }
            if (currentAudio) { currentAudio.pause(); currentAudio = null; }
            currentlyPlayingUrl = null;
            window._currentlyPlayingUrl = null;
            window._currentAudio = null;
        }

        function clearMetadata(stationDiv) {
            const metadataDiv = stationDiv?.querySelector('.metadata');
            if (metadataDiv) metadataDiv.innerHTML = '';
            stopLyricsRotation();
            const lyricsContainer = document.getElementById("lyrics-container");
            if (lyricsContainer) lyricsContainer.innerHTML = '<p class="current-lyric">Velg en stasjon</p><p class="next-lyric"></p>';
        }

        function togglePlayStation(url, stationDiv) {
            if (!stationDiv) {
                stationDiv = Array.from(document.querySelectorAll('.station'))
                    .find(div => div.getAttribute("data-url") === url);
                if (!stationDiv) return;
            }

            const category = stationDiv.getAttribute("data-category");
            let station = stationsData[category]?.find(s => s.url === url);
            
            if (!station && category === "Favoritter") {
                const favorites = JSON.parse(localStorage.getItem("favorites")) || [];
                const favStation = favorites.find(fav => fav.url === url);
                if (favStation) station = stationsData[favStation.category]?.find(s => s.url === url);
            }
            if (!station) return;

            localStorage.setItem('lastStation', JSON.stringify({ category, url }));

            const previousExpanded = document.querySelector('.station.expanded');
            if (previousExpanded) {
                previousExpanded.classList.remove('expanded');
                previousExpanded.style.gridRow = '';
                previousExpanded.style.gridColumn = '';
                previousExpanded.querySelector('.metadata')?.remove();
            }

            if (currentlyPlayingUrl === url) {
                stopStreaming();
                if (currentAudio) currentAudio.pause();
                clearMetadata(stationDiv);
                stationDiv.classList.remove('expanded');
                currentlyPlayingUrl = null;
                window._currentlyPlayingUrl = null;
                return;
            }

            stopStreaming();
            if (currentAudio) {
                currentAudio.pause();
                currentAudio = null;
            }

            stationDiv.classList.add('expanded');
            stationDiv.style.gridRow = '1';
            stationDiv.style.gridColumn = '1 / -1';

            currentlyPlayingUrl = url;
            songStartTime = Date.now();
            window._currentlyPlayingUrl = url;
            window._lastKnownUrl = url;

            currentAudio = new Audio(url);
            window._currentAudio = currentAudio;

            currentAudio.play()
                .then(() => {
                    setupWebSocket(url, stationDiv, station, station.app || "");
                })
                .catch(err => console.error("Lokal avspillingsfeil:", err));
        }

        function isFavorite(url) {
            const favorites = JSON.parse(localStorage.getItem("favorites")) || [];
            return favorites.some(fav => fav.url === url);
        }

        function toggleFavorite(url, category) {
            const favorites = JSON.parse(localStorage.getItem("favorites")) || [];
            const index = favorites.findIndex(fav => fav.url === url);
            if (index !== -1) favorites.splice(index, 1);
            else favorites.push({ url, category });
            localStorage.setItem("favorites", JSON.stringify(favorites));
        }

        function showStations(category) {
            stationsGrid.innerHTML = "";

            const stations = category === "Favoritter"
                ? (JSON.parse(localStorage.getItem("favorites")) || []).map(fav => stationsData[fav.category]?.find(station => station.url === fav.url)).filter(Boolean)
                : stationsData[category];

            if (stations && stations.length > 0) {
                stations.forEach(station => {
                    const stationDiv = document.createElement("div");
                    stationDiv.className = "station";
                    stationDiv.setAttribute("data-category", category);
                    stationDiv.setAttribute("data-url", station.url);
                    stationDiv.setAttribute("data-app", station.app || "");
                    stationDiv.setAttribute("data-name", station.name || "");

                    if (station.logo) {
                        const logo = document.createElement("img");
                        logo.src = station.logo;
                        logo.alt = station.name + " logo";
                        logo.onerror = () => { logo.style.display = "none"; };
                        stationDiv.appendChild(logo);
                    }

                    const favoriteButton = document.createElement("button");
                    favoriteButton.className = "favorite-button";
                    favoriteButton.textContent = isFavorite(station.url) ? "★" : "☆";
                    favoriteButton.onclick = (e) => {
                        e.stopPropagation();
                        toggleFavorite(station.url, category);
                        favoriteButton.textContent = isFavorite(station.url) ? "★" : "☆";
                    };
                    stationDiv.appendChild(favoriteButton);

                    stationDiv.onclick = () => togglePlayStation(station.url, stationDiv);
                    stationsGrid.appendChild(stationDiv);
                });
            } else {
                stationsGrid.innerHTML = '<p style="color:white;padding:20px;">Ingen stasjoner funnet.</p>';
            }
        }

        document.addEventListener("DOMContentLoaded", () => {
            loadMenu('main');
            updateHeaderScrollButtons();
        });

        window.addEventListener('resize', updateHeaderScrollButtons);
    </script>
    <script src="sonos-ui.js"></script>
</body>
</html>
