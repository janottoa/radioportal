<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radioportal</title>
    <style>
        /* Grunnleggende styling */
        body {
            display: flex;
            flex-direction: column;
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: black;
            color: white;
        }

        .header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background-color: gray;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 10;
        }

        .header-logo img {
            height: 40px;
        }

        .header-title {
            font-size: 1.8em;
            font-weight: bold;
        }

        .switch-button {
            background-color: #555;
            color: white;
            padding: 8px 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .container {
            display: flex;
            flex: 1;
            margin-top: 65px;
            margin-bottom: 50px;
        }

        .stations-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            padding: 10px;
            width: 100%;
        }

        .station {
            background-color: #444;
            border-radius: 10px;
            text-align: center;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .station:hover {
            transform: scale(1.05);
        }

        .station img {
            max-width: 80%;
            max-height: 100px;
            margin: 10px auto;
        }

        .station-name {
            font-weight: bold;
            margin-bottom: 10px;
        }

        .station.playing {
            background-color: #222;
            border: 2px solid #888;
        }

        .footer {
            position: fixed;
            bottom: 0;
            width: 100%;
            background-color: gray;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 20px;
            z-index: 10;
        }

        .footer img {
            height: 30px;
            margin-right: 10px;
        }

        .footer span {
            font-size: 1.1em;
            font-weight: bold;
        }

        .expanded {
            grid-column: 1 / -1;
            grid-row: 1;
            height: 300px;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            padding: 20px;
            background-color: #555;
        }

        .expanded img {
            height: 150px;
            margin-right: 20px;
        }

        .expanded .metadata {
            text-align: left;
        }
    </style>
</head>
<body>
<!-- Header -->
<div class="header">
    <div class="header-logo">
        <img src="moffaradio.png" alt="Moffa Logo">
    </div>
    <div class="header-title">RADIOPORTAL</div>
    <button class="switch-button" onclick="toggleDayMode()">Bytt design</button>
</div>

<!-- Container -->
<div class="container">
    <div class="stations-grid" id="stations-grid"></div>
</div>

<!-- Footer -->
<div class="footer">
    <img id="station-logo" src="" alt="Logo" style="display: none;">
    <span id="song-info">Ingen stasjon valgt</span>
</div>

<!-- Script -->
<script>
    const stationsGrid = document.getElementById("stations-grid");
    const stationLogo = document.getElementById("station-logo");
    const songInfo = document.getElementById("song-info");
    let stationsData = [];
    let currentAudio = null;

    // Hent stasjoner fra JSON
    fetch('stations.json')
        .then(response => response.json())
        .then(data => {
            stationsData = data;
            loadStations(data);
        })
        .catch(err => console.error("Feil ved henting av stasjoner:", err));

    // Last inn stasjoner i grid
    function loadStations(data) {
        data.forEach(station => {
            const stationDiv = document.createElement("div");
            stationDiv.className = "station";
            stationDiv.dataset.url = station.url;

            const logo = document.createElement("img");
            logo.src = station.logo || "fallback.png";
            logo.alt = `${station.name} logo`;
            stationDiv.appendChild(logo);

            const name = document.createElement("div");
            name.className = "station-name";
            name.textContent = station.name;
            stationDiv.appendChild(name);

            stationDiv.addEventListener("click", () => togglePlayStation(station, stationDiv));
            stationsGrid.appendChild(stationDiv);
        });
    }

    // Spill av valgt stasjon
    async function togglePlayStation(station, stationDiv) {
        if (currentAudio) {
            currentAudio.pause();
            currentAudio = null;
        }

        currentAudio = new Audio(station.url);
        try {
            await currentAudio.play();
            updateFooter(station);
            updateExpandedView(station, stationDiv);
        } catch (err) {
            console.error("Feil ved avspilling:", err);
        }
    }

    // Oppdater footer
    function updateFooter(station) {
        stationLogo.src = station.logo || "fallback.png";
        stationLogo.style.display = "inline";
        songInfo.textContent = `Spiller nå: ${station.name}`;
    }

    // Oppdater utvidet visning
    function updateExpandedView(station, stationDiv) {
        document.querySelectorAll(".station").forEach(div => div.classList.remove("expanded"));
        stationDiv.classList.add("expanded");

        const metadataDiv = document.createElement("div");
        metadataDiv.className = "metadata";
        metadataDiv.innerHTML = `
                <p>Stasjon: ${station.name}</p>
                <p>Sang: ${station.song || 'Ukjent'}</p>
                <p>Artist: ${station.artist || 'Ukjent'}</p>
            `;
        stationDiv.appendChild(metadataDiv);
    }

    // Bytt dag-/nattmodus
    function toggleDayMode() {
        document.body.classList.toggle("day-mode");
    }
</script>
</body>
</html>
