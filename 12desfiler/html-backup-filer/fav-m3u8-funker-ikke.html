function playDashStream(dashUrl) {
    const dashSocket = new WebSocket('ws://192.168.0.11:8084');

    dashSocket.onopen = () => {
        console.log("DASH WebSocket tilkoblet.");
        dashSocket.send(dashUrl);
    };

    dashSocket.onmessage = (event) => {
        console.log("Mottok lyddata fra DASH WebSocket.");
        // Lyddata fra DASH kan spilles av via en AudioContext
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();
        audioContext.decodeAudioData(event.data, (buffer) => {
            const source = audioContext.createBufferSource();
            source.buffer = buffer;
            source.connect(audioContext.destination);
            source.start(0);
        });
    };

    dashSocket.onerror = (error) => {
        console.error("DASH WebSocket-feil:", error);
        alert("Kunne ikke spille av DASH-strøm.");
    };

    dashSocket.onclose = () => {
        console.log("DASH WebSocket-tilkobling lukket.");
    };
}

async function initializeAudio(url, stationDiv, station = null, useLogoBackground = false) {
    if (!station) {
        console.error("Stasjon mangler for URL:", url);
        return;
    }

    console.log("Starter avspilling for stasjon:", station);

    // Oppdater footer for stasjonen
    updateFooter(station);

    // Fjern "playing" og "logo-playing" fra alle stasjoner
    document.querySelectorAll(".station").forEach(div => {
        div.classList.remove("playing", "logo-playing");
        div.style.backgroundImage = ""; // Fjern eventuell tidligere logo som bakgrunn
    });

    // Marker spillende stasjon
    if (useLogoBackground && station.logo) {
        stationDiv.classList.add("logo-playing");
        stationDiv.style.backgroundImage = `url('${station.logo}')`;
    } else {
        stationDiv.classList.add("playing");
    }

    // Fjern favorittknappen for den spillende stasjonen
    const playingFavoriteButton = stationDiv.querySelector('.favorite-button');
    if (playingFavoriteButton) {
        playingFavoriteButton.style.display = 'none';
    }

    // Stopp tidligere lydstrøm
    if (currentAudio) {
        currentAudio.pause();
        currentAudio = null;
    }

    // Håndter MP3-strømmer (standard HTML5 <audio>)
    if (url.endsWith('.mp3')) {
        try {
            console.log("Starter MP3-avspilling:", url);
            currentAudio = new Audio(url);
            currentAudio.muted = true; // Start mutet for å unngå blokkering
            currentlyPlayingUrl = url;

            currentAudio.addEventListener("canplay", () => {
                currentAudio.muted = false;
                currentAudio.play()
                    .then(() => console.log("Avspilling startet for MP3:", station.name))
                    .catch(error => console.error("Avspilling feilet for MP3:", error));
            });

            currentAudio.addEventListener("error", (e) => {
                console.error("Feil ved lasting av MP3-strøm:", e);
                alert("Kunne ikke spille av stasjonen. Sjekk nettverk og URL.");
            });

            return; // Fullfør for MP3-strømmer
        } catch (error) {
            console.error("Feil ved opprettelse av MP3-lydobjekt:", error);
            return;
        }
    }

    // Håndter HLS-strømmer (m3u8)
    if (url.endsWith('.m3u8')) {
        if (Hls.isSupported()) {
            console.log("Starter HLS-avspilling:", url);
            const videoElement = document.createElement("video");
            videoElement.style.display = "none"; // Skjul videoelementet
            document.body.appendChild(videoElement);

            const hls = new Hls();
            hls.loadSource(url);
            hls.attachMedia(videoElement);

            hls.on(Hls.Events.MANIFEST_PARSED, () => {
                videoElement.play()
                    .then(() => console.log("HLS-avspilling startet:", url))
                    .catch(error => console.error("HLS-avspilling feilet:", error));
            });

            currentAudio = videoElement;
            return; // Avslutt her for HLS-strømmer
        } else {
            console.error("HLS støttes ikke i denne nettleseren.");
            alert("HLS-strøm støttes ikke i nettleseren din.");
        }
    }

    console.error("Ukjent strømformat:", url);
}

async function togglePlayStation(url, stationDiv) {
    const category = stationDiv.getAttribute("data-category");
    const station = stationsData[category]?.find(s => s.url === url);

    if (!station) {
        console.error("Stasjon ikke funnet for URL:", url, "og kategori:", category);
        return;
    }

    console.log("Spiller av stasjon:", station);

    // Hvis stasjonen allerede spiller
    if (currentAudio && url === currentlyPlayingUrl) {
        currentAudio.pause();
        currentlyPlayingUrl = null;
        stationDiv.classList.remove('playing', 'logo-playing');
        stationDiv.style.backgroundImage = ''; // Fjern bakgrunn
        const favoriteButton = stationDiv.querySelector('.favorite-button');
        if (favoriteButton) {
            favoriteButton.style.display = 'block'; // Vis favorittknappen igjen
        }
        updateFooter(null);
        return;
    }

    // Hvis en annen stasjon spiller, stopp den
    if (currentAudio) currentAudio.pause();

    // Start avspilling
    initializeAudio(url, stationDiv, station, true); // Bruk bakgrunnslogo som standard
}

function showStations(category) {
    const stationsGrid = document.getElementById("stations-grid");
    stationsGrid.innerHTML = ""; // Tøm grid

    const stations = category === "Favoritter"
        ? JSON.parse(localStorage.getItem("favorites")) || []
        : stationsData[category];

    if (stations && stations.length > 0) {
        stations.forEach(favOrStation => {
            const station = category === "Favoritter" 
                ? stationsData[favOrStation.category]?.find(s => s.url === favOrStation.url) 
                : favOrStation;

            if (!station) {
                console.warn("Ugyldig stasjonsdata:", favOrStation);
                return;
            }

            const stationDiv = document.createElement("div");
            stationDiv.classList.add("station");
            stationDiv.setAttribute("data-category", category);
            stationDiv.setAttribute("data-url", station.url);
            stationDiv.onclick = () => togglePlayStation(station.url, stationDiv);

            // Legg til logo
            if (station.logo) {
                const logo = document.createElement("img");
                logo.src = station.logo;
                logo.alt = `${station.name} logo`;
                logo.className = "station-logo";
                stationDiv.appendChild(logo);
            } else {
                console.warn("Ingen logo funnet for stasjonen:", station.name);
            }

            // Legg til stasjonsnavn
            const name = document.createElement("div");
            name.classList.add("station-name");
            name.textContent = station.name;
            stationDiv.appendChild(name);

            // Legg til favorittknapp
            const favoriteButton = document.createElement("button");
            favoriteButton.classList.add("favorite-button");
            favoriteButton.textContent = isFavorite(station.url) ? "★" : "☆";
            favoriteButton.onclick = (e) => {
                e.stopPropagation(); // Forhindrer klikk på stasjonen
                toggleFavorite(station.url, category);
                favoriteButton.textContent = isFavorite(station.url) ? "★" : "☆";
            };
            stationDiv.appendChild(favoriteButton);

            stationsGrid.appendChild(stationDiv); // Legg stasjonsdiven til grid
        });
    } else {
        stationsGrid.innerHTML = `<p style="color:white;">Ingen stasjoner funnet.</p>`;
    }
}

// Favoritt-funksjon
function toggleFavorite(url, category) {
    const favorites = JSON.parse(localStorage.getItem("favorites")) || [];
    const index = favorites.findIndex(fav => fav.url === url);

    if (index !== -1) {
        favorites.splice(index, 1); // Fjern fra favoritter
    } else {
        favorites.push({ url, category }); // Legg til favoritter
    }

    localStorage.setItem("favorites", JSON.stringify(favorites));
}

function isFavorite(url) {
    const favorites = JSON.parse(localStorage.getItem("favorites")) || [];
    return favorites.some(fav => fav.url === url);
}

        // Oppdater navn
        channelNameElement.textContent = station.name || "Ukjent stasjon";
        songInfoElement.textContent = station.songInfo || "";
    } else {
        // Tilbakestill når ingen stasjon er valgt
        logoElement.style.display = "none";
        /* channelNameElement.textContent = "Velg en radiokanal"; */
        songInfoElement.textContent = "";
    }
}

    </script>
</body>
