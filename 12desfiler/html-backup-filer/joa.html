<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebSocket Logo Test</title>
</head>
<body>
    <h1>WebSocket Logo Test</h1>
    <img id="logo" alt="Logo will appear here" style="max-width: 200px;"/>
    <script>
        const ws = new WebSocket("ws://anthonsen.net:8088");
        
        ws.onopen = () => {
            console.log("WebSocket connection established.");
        };

        ws.onmessage = (event) => {
            const message = JSON.parse(event.data);
            if (message.type === "logo") {
                document.getElementById("logo").src = message.data;
            }
        };

        ws.onerror = (error) => {
            console.error("WebSocket error:", error);
        };

        ws.onclose = () => {
            console.log("WebSocket connection closed.");
        };
    </script>
</body>
</html>
