<!DOCTYPE html>

    <meta charset="UTF-8">

    <style>
        body {
            display: flex;
            flex-direction: column;
            margin: 0;
            font-family: Arial, sans-serif;
        }

        .header {
            background-color: #908962;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            box-sizing: border-box;
            position: fixed;
            top: 0;
            z-index: 10;
        }

        .header-title {
            font-size: 1.8em;
            font-weight: bold;
            text-align: center;
            flex: 1;
            color: #fff;
        }

        /* Sidebar for valg */
        .sidebar {
            width: 200px;
            background-color: #f0f0f0;
            padding: 20px;
            position: fixed;
            left: 0;
            top: 60px; /* Plass til headeren */
            bottom: 0;
            overflow-y: auto;
            z-index: 10;
        }

        .sidebar button {
            background-color: #d3d3d3;
            border: none;
            padding: 10px;
            font-size: 1em;
            cursor: pointer;
            text-align: center;
            border-radius: 5px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            margin-bottom: 10px;
            transition: background-color 0.3s ease;
        }

        .content {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 70px 10px 60px; /* Justert for header og footer */
        }

        /* Stations grid layout */
        .stations-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 15px;
            padding: 10px;
        }

        .station {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            background-color: #f9f9f9;
            text-align: center;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            transition: background-color 0.3s ease;
        }

        .station img {
            max-width: 60px;
            margin-bottom: 5px;
            border-radius: 50%;
        }

        .footer {
            position: fixed;
            bottom: 0;
            width: 100%;
            background-color: #333;
            color: white;
            text-align: center;
            padding: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-sizing: border-box;
            font-size: 0.9em;
        }

        /* Mobile specific adjustments */
        @media (max-width: 768px) {
            .sidebar {
                width: 100%;
                height: auto;
                position: static;
                padding: 10px;
                display: none; /* Hide sidebar initially on mobile */
            }

            .header {
                flex-direction: column;
            }

            .stations-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 10px;
            }

            .footer {
                flex-direction: column;
                font-size: 0.8em;
            }

            .toggle-sidebar {
                display: block;
                background-color: #444;
                color: #fff;
                padding: 5px 10px;
                border: none;
                font-size: 1em;
                cursor: pointer;
                border-radius: 5px;
            }
        }
    </style>
