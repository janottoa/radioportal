            }
            
        .sidebar {

        .sidebar button:hover {
            background-color: #c0c0c0;

        }
        .content {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 10px;
        }
        .stations-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
        }
        .station {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            background-color: #f9f9f9;
            text-align: center;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);

let ws;
let currentAudio = null;
let currentlyPlayingUrl = null;

function setupWebSocket(url, station) {
    if (ws) ws.close();

    ws = new WebSocket('ws://anthonsen.net:8080');  // IP-adressen til serveren

    ws.onopen = () => {
        ws.send(url); // Send radiostrøm-URL til WebSocket-serveren
    };

    ws.onmessage = (event) => {
        const data = JSON.parse(event.data);
        updateSongInfo(data.StreamTitle); // Oppdater songInfo med StreamTitle fra serveren
    };

    ws.onerror = (error) => {
        console.error("WebSocket-feil:", error);
        updateSongInfo("Ingen metadata tilgjengelig");
    };

    ws.onclose = () => {
        console.log("WebSocket-tilkobling lukket");
    };
}

async function togglePlayStation(url, stationDiv) {
    const category = stationDiv.getAttribute("data-category");
    const station = stationsData[category].find(s => s.url === url);

    if (currentAudio && url === currentlyPlayingUrl) {
        currentAudio.pause();
        currentlyPlayingUrl = null;
        stationDiv.classList.remove('playing');
        updateFooter(null);
        document.title = "Radioportal";  // Tilbakestiller tittelen til standard
        updateMetaTags("Radioportal", ""); // Tilbakestiller meta-beskrivelsen
        if (ws) ws.close(); // Lukk WebSocket når stasjon stoppes
    } else {
        if (currentAudio) currentAudio.pause();

        let actualStreamUrl = url.endsWith('.xspf') ? await fetchStreamUrlFromXSPF(url) : url;
        if (!actualStreamUrl) {
            alert("Strømmen er ikke tilgjengelig.");
            return;
        }

        currentAudio = new Audio(actualStreamUrl);
        currentAudio.play();
        currentlyPlayingUrl = url;

        setupWebSocket(actualStreamUrl, station); // Start WebSocket for å hente metadata

        currentAudio.addEventListener('canplay', () => {
            updateFooter(station); // Oppdater med stasjonsnavn og logo først
            document.title = station.name; // Oppdater tittelen med stasjonsnavn
            updateMetaTags(station.name, "Henter metadata...");
        });

        document.querySelectorAll('.station').forEach(st => st.classList.remove('playing'));
        stationDiv.classList.add('playing');
    }
}

function updateSongInfo(songTitle) {
    const songInfoElement = document.getElementById('song-info');
    songInfoElement.textContent = songTitle || "Ingen metadata tilgjengelig";

    const stationName = document.getElementById('channel-name').textContent;
    document.title = `${stationName} - ${songTitle || ''}`;
    updateMetaTags(stationName, songTitle || "Ingen metadata tilgjengelig");
}

function updateFooter(station) {
    const logoElement = document.getElementById('station-logo');
    const channelNameElement = document.getElementById('channel-name');
    const songInfoElement = document.getElementById('song-info');

    if (station) {
        logoElement.src = station.logo;
        logoElement.style.display = "inline";
        channelNameElement.textContent = station.name;
        songInfoElement.textContent = "Henter metadata..."; // Vises før sangtittel kommer inn
        document.title = station.name; // Oppdater tittelen med stasjonsnavnet
        updateMetaTags(station.name, "Henter metadata...");
    } else {
        logoElement.style.display = "none";
        channelNameElement.textContent = "Velg en radiokanal";
        songInfoElement.textContent = "Ingen metadata tilgjengelig";
        document.title = "Radioportal";  // Tilbakestiller tittelen til standard når ingen stasjon spilles
        updateMetaTags("Radioportal", "");
    }
}

function updateMetaTags(stationName, songTitle) {
    let metaTitle = document.querySelector("meta[name='description']");
    if (!metaTitle) {
        metaTitle = document.createElement('meta');
        metaTitle.name = "description";
        document.head.appendChild(metaTitle);
    }
    metaTitle.content = `${stationName} - ${songTitle}`;
}

function showStations(category) {
    const stationsGrid = document.getElementById('stations-grid');
    stationsGrid.innerHTML = '';
    stationsData[category].forEach(station => {
        const stationDiv = document.createElement('div');
        stationDiv.classList.add('station');
        stationDiv.setAttribute("data-category", category);
        stationDiv.onclick = () => togglePlayStation(station.url, stationDiv);

        const logo = document.createElement('img');
        logo.src = station.logo;
        logo.alt = `${station.name} logo`;
        stationDiv.appendChild(logo);

        const name = document.createElement('h3');
        name.textContent = station.name;
        stationDiv.appendChild(name);

        stationsGrid.appendChild(stationDiv);
    });
}
