<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radioportal</title>
    <style>
        /* Nattdesign som standard tilpasset mobil */
        body {
            display: flex;
            flex-direction: column;
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: black;
            font-size: 16px;
        }

        .header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background-color: gray;
            padding: 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-sizing: border-box;
            color: black;
            z-index: 10;
        }

        .header-logo img {
            height: 35px;
        }

        .header-title {
            font-size: 1.4em;
            font-weight: bold;
            text-align: center;
            flex: 1;
        }

        .switch-button {
            background-color: #555;
            color: white;
            padding: 5px 10px;
            font-size: 0.9em;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s ease;
            margin-left: 5px;
        }

        .switch-button:hover {
            background-color: #666;
        }

        .container {
            display: flex;
            flex: 1;
            width: 100%;
            flex-direction: column;
            margin-top: 60px;
            padding: 10px;
        }

        .sidebar {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            background-color: #333;
            padding: 10px;
            justify-content: space-between;
        }

        .sidebar button {
            background-color: #555;
            color: white;
            border: none;
            padding: 10px;
            font-size: 0.9em;
            cursor: pointer;
            text-align: center;
            border-radius: 5px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            transition: box-shadow 0.3s ease, transform 0.3s ease;
            flex: 1 1 calc(50% - 10px);
        }

        .sidebar button:hover {
            background-color: #666;
        }

        .stations-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 10px;
            padding: 10px;
        }


        .station {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            background-color: #444;
            color: white;
            text-align: center;
            border: 1px solid #888;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            cursor: pointer;
            padding: 10px;
            transition: all 0.3s ease;
        }

        .station:hover {
            background-color: #555;
            box-shadow: 0 6px 8px rgba(0, 0, 0, 0.2);
            transform: translateY(-2px);
        }

        .station img {
            max-width: 100%;
            max-height: 60px;
            object-fit: contain;
            margin-bottom: 10px;
        }

        .station .station-name {
            font-size: 0.9em;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .station .favorite-button {
            display: block;
            background: none;
            border: none;
            color: white;
            font-size: 1.2em;
            cursor: pointer;
            transition: color 0.3s ease;
            margin-top: 5px;
        }

        .station.playing .favorite-button {
            display: none;
        }

        .station.playing {
            background-color: #222;
            border-color: #666;
            box-shadow: 0 6px 8px rgba(0, 0, 0, 0.3);
        }

        .footer {
            position: fixed;
            bottom: 0;
            width: 100%;
            background-color: gray;
            color: black;
            text-align: center;
            padding: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        #song-info {
            font-size: 1em;
            font-weight: bold;
            font-style: italic;
        }

        .footer .info {
            font-size: 0.9em;
        }

        /* Dagfarger */
        .day-mode {
            background-color: white;
        }
        .day-mode .header {
            background-color:#d3d3d3;
            color: black;
        }
        .day-mode .sidebar {
            background-color: #f0f0f0;
        }
        .day-mode .sidebar button {
            background-color: #d3d3d3;
            color: black;
        }
        .day-mode .station {
            background-color: #f9f9f9;
            color: black;
        }
        .day-mode .station:hover {
            background-color: #e0e0e0;
        }
        .day-mode .station.playing {
            background-color: #c0c0c0;
            border-color: #888;
        }
        .day-mode .footer {
            background-color: #333;
            color: white;
        }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>



</head>
<body>
<div class="header">
    <div class="header-logo">
        <img src="moffaradio.png" alt="Moffa Logo">
    </div>

    <div class="header-title">RADIOPORTAL</div>

    <div class="header-buttons">
        <button class="switch-button" onclick="toggleDayMode()">Bytt design</button>
        <button class="switch-button" onclick="refreshPage()">Refresh</button>
    </div>
</div>



<div class="container">
    <div class="sidebar" id="sidebar"></div>

    <div class="stations-grid" id="stations-grid"></div>
</div>

<div class="footer">
    <div class="info">
        <img id="station-logo" src="" alt="Stasjonslogo" style="display:none; height: 30px; margin-right: 10px;">
        <span id="channel-name"></span>
        <span id="song-info"></span>
    </div>
</div>

<script>
    function refreshPage() {
        window.location.reload();
    }

    function toggleDayMode() {
        document.body.classList.toggle('day-mode');
    }

    const sidebar = document.getElementById("sidebar");
    const stationsGrid = document.getElementById("stations-grid");

    const menus = {
        main: [
            { label: "NRK", action: () => showStations("NRK") },
            { label: "P4", action: () => showStations("P4") },
            { label: "Radio Norge", action: () => showStations("Radio Norge") },
            { label: "Metro", action: () => showStations("Metro") },
            { label: "Lokale", action: () => showStations("Lokale") },
            { label: "Internet", action: () => showStations("Internet") },
            { label: "Latinske", action: () => showStations("Latinske") },
            { label: "Mer...", action: () => loadMenu("extra") },

        ],
        extra: [
            { label: "1fm", action: () => showStations("1fm") },
            { label: "181fm", action: () => showStations("181fm") },
            { label: "Ledig..", action: () => showStations("Ledig2") },
            { label: "Sverige  ", action: () => showStations("se") },
            { label: "Danmark", action: () => showStations("dk") },
            { label: "UK", action: () => showStations("utland") },
            { label: "Tilbake", action: () => loadMenu("main") },
            { label: "Mer...", action: () => loadMenu("extra2") },
        ],
        extra2: [
            { label: "Tyskland", action: () => showStations("de") },
            { label: "USA", action: () => showStations("us") },
            { label: "Middelhavet", action: () => showStations("middelhavet") },
            { label: "Ledig..", action: () => showStations("Ledig3u") },
            { label: "Ledig..", action: () => showStations("Ledig4") },
            { label: "Ledig..", action: () => showStations("Ledig5") },
            { label: "Tilbake", action: () => loadMenu("extra") },
            { label: "Startside", action: () => loadMenu("main") },
        ],
    };
    function loadMenu(menuName) {
        const buttons = Array.from(sidebar.querySelectorAll("button")).filter(
            (button) => button.getAttribute("data-category") !== "Favoritter"
        );

        buttons.forEach((button) => button.remove());

        menus[menuName].forEach((item) => {
            const button = document.createElement("button");
            button.textContent = item.label;
            button.onclick = item.action;
            sidebar.appendChild(button);
        });
    }

    loadMenu('main');

    let stationsData = {};
    let currentAudio = null;
    let currentlyPlayingUrl = null;

    let url;
    if (window.location.hostname.startsWith('192.168.') || window.location.hostname === 'localhost') {
        url = 'http://192.168.0.11/stations.json';
    } else {
        url = 'http://anthonsen.net:2222/stations.json';
    }

    fetch(url)
        .then(response => {
            if (response.ok) {
                return response.json();
            } else {
                throw new Error(`Network response was not ok: ${response.statusText}`);
            }
        })
        .then(data => {
            stationsData = data;
            const lastStation = JSON.parse(localStorage.getItem('lastStation'));
            if (lastStation) {
                const category = lastStation.category;
                const url = lastStation.url;
                showStations(category);
                setTimeout(() => {
                    const stationDiv = Array.from(document.querySelectorAll('.station')).find(div =>
                        div.getAttribute("data-category") === category && div.getAttribute("data-url") === url
                    );
                    if (stationDiv) {
                        initializeAudio(url, stationDiv);
                    }
                }, 1000);
            } else {
                showStations('NRK');
            }
        })
        .catch(error => console.error('Fetch error:', error));

    async function initializeAudio(url, stationDiv, station) {
        try {
            console.log("Starter avspilling for stasjon:", station);

            if (!url || !station || !stationDiv) {
                console.error("Manglende data: ", { url, station, stationDiv });
                return;
            }

            document.querySelectorAll('.station').forEach(div => {
                div.classList.remove('playing', 'logo-playing');
                div.style.backgroundImage = '';
                const favoriteButton = div.querySelector('.favorite-button');
                if (favoriteButton) {
                    favoriteButton.style.display = 'block';
                }
            });

            stationDiv.classList.add('playing');
            if (station.logo) {
                stationDiv.classList.add('logo-playing');
                stationDiv.style.backgroundImage = `url('${station.logo}')`;
            }

            const playingFavoriteButton = stationDiv.querySelector('.favorite-button');
            if (playingFavoriteButton) {
                playingFavoriteButton.style.display = 'none';
            }

            if (currentAudio) {
                currentAudio.pause();
                currentAudio = null;
            }

            currentAudio = new Audio(url);
            currentAudio.muted = true;

            currentAudio.addEventListener('canplay', () => {
                currentAudio.muted = false;
                currentAudio.play()
                    .then(() => {
                        console.log("Avspilling startet for:", station.name);
                        updateFooter(station);
                    })
                    .catch(err => console.error("Feil under avspilling:", err));
            });

            if (url.endsWith('.m3u8')) {
                if (Hls.isSupported()) {
                    const videoElement = document.createElement('video');
                    videoElement.style.display = 'none';
                    document.body.appendChild(videoElement);

                    const hls = new Hls();
                    hls.loadSource(url);
                    hls.attachMedia(videoElement);
                    hls.on(Hls.Events.MANIFEST_PARSED, () => {
                        videoElement.play()
                            .then(() => console.log("HLS-avspilling startet:", url))
                            .catch(error => console.error("HLS-avspilling feilet:", error));
                    });

                    currentAudio = videoElement;
                    updateFooter(station);
                    return;
                } else {
                    console.error("HLS støttes ikke i denne nettleseren.");
                    alert("HLS-strøm støttes ikke i nettleseren din.");
                    return;
                }
            }

            currentAudio.addEventListener('error', (error) => {
                console.error("Feil ved lasting av lydstrøm:", error);
                alert("Kunne ikke spille av stasjonen. Sjekk nettverk og URL.");
            });

            setupWebSocket(url, stationDiv, station);
        } catch (error) {
            console.error("Feil i initializeAudio:", error);
        }
    }

    async function togglePlayStation(url, stationDiv) {
        const category = stationDiv.getAttribute("data-category");
        const station = stationsData[category]?.find(s => s.url === url);

        if (!station) {
            console.error("Stasjon ikke funnet for URL:", url, "og kategori:", category);
            return;
        }

        console.log("Spiller av stasjon:", station);

        if (currentAudio && url === currentlyPlayingUrl) {
            currentAudio.pause();
            currentAudio = null;
            currentlyPlayingUrl = null;
            stationDiv.classList.remove('playing', 'logo-playing');
            stationDiv.style.backgroundImage = '';
            const favoriteButton = stationDiv.querySelector('.favorite-button');
            if (favoriteButton) {
                favoriteButton.style.display = 'block';
            }
            updateFooter(null);
            return;
        }

        if (currentAudio) {
            currentAudio.pause();
            currentAudio = null;
            currentlyPlayingUrl = null;
        }

        currentlyPlayingUrl = url;
        initializeAudio(url, stationDiv, station);
    }

    function isFavorite(url) {
        const favorites = JSON.parse(localStorage.getItem("favorites")) || [];
        return favorites.some(fav => fav.url === url);
    }

    function updateFavoritesSidebar() {
        const favorites = JSON.parse(localStorage.getItem("favorites")) || [];
        let favoriteButton = sidebar.querySelector('button[data-category="Favoritter"]');

        if (!favoriteButton) {
            favoriteButton = document.createElement("button");
            favoriteButton.textContent = "Favoritter";
            favoriteButton.setAttribute("data-category", "Favoritter");
            favoriteButton.onclick = () => showStations("Favoritter");
            sidebar.prepend(favoriteButton);
        }

        favoriteButton.disabled = favorites.length === 0;
    }

    function showStations(category) {
        const stationsGrid = document.getElementById("stations-grid");
        stationsGrid.innerHTML = "";

        const stations = category === "Favoritter"
            ? JSON.parse(localStorage.getItem("favorites")) || []
            : stationsData[category];

        if (stations && stations.length > 0) {
            stations.forEach(favOrStation => {
                const station = category === "Favoritter"
                    ? stationsData[favOrStation.category]?.find(s => s.url === favOrStation.url)
                    : favOrStation;

                if (!station) {
                    console.warn("Ugyldig stasjonsdata:", favOrStation);
                    return;
                }

                const stationDiv = document.createElement("div");
                stationDiv.classList.add("station");
                stationDiv.setAttribute("data-category", favOrStation.category || category);
                stationDiv.setAttribute("data-url", station.url);
                stationDiv.onclick = () => togglePlayStation(station.url, stationDiv);

                if (station.logo) {
                    const logo = document.createElement("img");
                    logo.src = station.logo;
                    logo.alt = `${station.name} logo`;
                    logo.className = "station-logo";
                    stationDiv.appendChild(logo);
                } else {
                    console.warn("Ingen logo funnet for stasjonen:", station.name);
                }

                const name = document.createElement("div");
                name.classList.add("station-name");
                name.textContent = station.name;
                stationDiv.appendChild(name);

                const favoriteButton = document.createElement("button");
                favoriteButton.classList.add("favorite-button");
                favoriteButton.textContent = isFavorite(station.url) ? "★" : "☆";
                favoriteButton.onclick = (e) => {
                    e.stopPropagation();
                    toggleFavorite(station.url, favOrStation.category || category);
                    favoriteButton.textContent = isFavorite(station.url) ? "★" : "☆";
                };
                stationDiv.appendChild(favoriteButton);

                stationsGrid.appendChild(stationDiv);
            });
        } else {
            stationsGrid.innerHTML = `<p style="color:white;">Ingen stasjoner funnet.</p>`;
        }
    }

    function toggleFavorite(url, category) {
        const favorites = JSON.parse(localStorage.getItem("favorites")) || [];
        const index = favorites.findIndex(fav => fav.url === url);

        if (index !== -1) {
            favorites.splice(index, 1);
        } else {
            favorites.push({ url, category });
        }

        localStorage.setItem("favorites", JSON.stringify(favorites));
    }

    let ws;

    function setupWebSocket(url, stationDiv, station) {
        if (ws) ws.close();
        ws = new WebSocket('ws://anthonsen.net:8080');

        ws.onopen = () => {
            console.log("WebSocket åpen for URL:", url);
            ws.send(url);
        };

        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);
            console.log("Mottatt metadata:", data);

            const fallbackLogo = station.logo;

            let backgroundImageUrl = fallbackLogo;

            if (data.imageUrl && data.imageUrl.trim()) {
                const sanitizedUrl = data.imageUrl.split(',')[0].replace(/[\x00-\x1F\x7F-\x9F"]/g, "").trim();
                if (sanitizedUrl) {
                    backgroundImageUrl = sanitizedUrl;
                    console.log("Renset og bruker bilde fra metadata:", backgroundImageUrl);
                } else {
                    console.log("Fant ugyldig imageUrl i metadata, bruker fallback:", fallbackLogo);
                }
            } else {
                console.log("Ingen gyldig imageUrl i metadata, bruker fallback:", fallbackLogo);
            }

            stationDiv.style.backgroundImage = `url('${backgroundImageUrl}')`;
            console.log("Oppdaterte stasjonsknapp med bilde:", backgroundImageUrl);

            const songInfo = data.StreamTitle || 'Ingen informasjon tilgjengelig';
            updateSongInfo(songInfo, backgroundImageUrl);
            console.log("Oppdaterte sanginfo:", songInfo);
        };
    }

    function updateSongInfo(songTitle, imageUrl) {
        const songInfoElement = document.getElementById('song-info');
        songInfoElement.textContent = songTitle || "";
        const logoElement = document.getElementById('station-logo');
        if (imageUrl) {
            logoElement.src = imageUrl;
            logoElement.style.display = "inline";
        }
        const stationName = document.getElementById('channel-name').textContent;
        document.title = `${stationName}  ${songTitle || ''}`;
    }

    function updateFooter(station, metadata = null) {
        const logoElement = document.getElementById("station-logo");
        const songInfoElement = document.getElementById("song-info");
        const channelNameElement = document.getElementById("channel-name");

        if (station) {
            console.log("Oppdaterer footer for stasjon:", station);

            if (station.logo) {
                logoElement.src = station.logo;
                document.logo = station.logo;
                logoElement.style.display = "inline";
                console.log("Oppdaterte logo til:", station.logo);
            } else {
                logoElement.style.display = "none";
                console.warn("Ingen logo funnet for stasjonen.");
            }

            if (metadata && metadata.songInfo) {
                songInfoElement.textContent = metadata.songInfo;
                console.log("Bruker metadata for songInfo:", metadata.songInfo);
            } else if (station.songInfo) {
                songInfoElement.textContent = station.songInfo;
                console.log("Bruker songInfo fra stations.json:", station.songInfo);
            } else {
                songInfoElement.textContent = "Ingen informasjon tilgjengelig";
                console.warn("Ingen metadata eller songInfo tilgjengelig for stasjonen.");
            }
        } else {
            logoElement.style.display = "none";
            if (channelNameElement) channelNameElement.textContent = "";
            songInfoElement.textContent = "";
        }

        console.log("Endelig verdi av songInfoElement:", songInfoElement.textContent);
    }
</script>
</body>
</html>
